<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시설물 안전진단 재료시험 산출기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: #f9fafb; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="text-gray-900 antialiased">
    <div id="app" class="min-h-screen flex flex-col md:flex-row">
        <!-- 사이드바 -->
        <aside class="w-full md:w-80 bg-white border-r border-gray-200 flex flex-col shrink-0 shadow-sm overflow-y-auto no-scrollbar h-screen sticky top-0">
            <div class="p-5 border-b border-gray-100 bg-gray-50/50">
                <div class="flex items-center gap-2 mb-1">
                    <div class="bg-indigo-600 p-1.5 rounded-lg shadow-md">
                        <i data-lucide="settings-2" class="w-4 h-4 text-white"></i>
                    </div>
                    <h2 class="text-[11px] font-black text-gray-900 uppercase tracking-tight">시설물 설정</h2>
                </div>
            </div>

            <!-- 시설물 목록 -->
            <div class="p-5 border-b border-gray-100">
                <div class="flex items-center justify-between mb-3">
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest">시설물 목록</label>
                    <button onclick="addFacility()" class="text-[10px] font-black text-indigo-600 hover:text-indigo-800">+ 추가</button>
                </div>
                <div id="facility-list" class="space-y-2 max-h-48 overflow-y-auto no-scrollbar"></div>
            </div>

            <div class="p-5 space-y-6">
                <section>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">01. 시설물 종류</label>
                    <div class="grid grid-cols-3 gap-2" id="type-selector"></div>
                </section>

                <section class="space-y-4">
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 tracking-widest">02. 기본 설정</label>
                    <div>
                        <label class="block text-[9px] font-black text-gray-500 uppercase mb-1 ml-0.5">점검 종류</label>
                        <select id="inspection-type" onchange="updateState({inspectionType: this.value})" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-xs font-bold focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                    </div>
                    <div>
                        <label class="block text-[9px] font-black text-gray-500 uppercase mb-1 ml-0.5">시설물 종별</label>
                        <select id="facility-class" onchange="updateState({facilityClass: this.value})" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-xs font-bold focus:ring-2 focus:ring-indigo-500 outline-none"></select>
                    </div>
                </section>

                <section class="pt-4 border-t border-gray-100">
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">03. 세부 제원 입력</label>
                    <div id="dynamic-inputs" class="space-y-4"></div>
                </section>
            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-5xl mx-auto space-y-6">
                <!-- 헤더 카드 -->
                <div class="bg-white rounded-3xl border border-gray-200 p-6 md:p-8 shadow-sm flex flex-col md:flex-row items-center justify-between gap-6 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-50 rounded-full -mr-32 -mt-32 opacity-40"></div>
                    <div class="flex items-center gap-5 relative z-10">
                        <div id="header-icon-container" class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-xl text-white">
                            <i id="header-icon" data-lucide="calculator" class="w-7 h-7"></i>
                        </div>
                        <div>
                            <div class="flex flex-wrap items-center gap-2 mb-1">
                                <h1 id="header-title" class="text-xl md:text-2xl font-black text-gray-900 tracking-tight">시설물 안전진단 산출표</h1>
                                <div id="header-badges" class="flex gap-1"></div>
                            </div>
                            <p class="text-xs text-gray-500 font-bold">국토안전관리원 세부지침 최신 기준 적용</p>
                        </div>
                    </div>
                    <button onclick="window.print()" class="flex items-center gap-2 px-4 py-2 bg-gray-900 text-white rounded-xl text-xs font-black hover:bg-black transition-all shadow-lg relative z-10">
                        <i data-lucide="printer" class="w-3.5 h-3.5"></i> 인쇄 / PDF
                    </button>
                </div>

                <!-- 결과 테이블 -->
                <div class="bg-white rounded-3xl border border-gray-200 shadow-xl overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full border-collapse text-left min-w-[900px]">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-200">
                                    <th rowspan="2" class="p-3 border-r border-gray-200 font-black text-gray-700 text-[10px] w-[140px] text-center">시험 항목</th>
                                    <th colspan="2" class="p-3 border-r border-gray-200 font-black text-gray-700 text-[10px] text-center">세부지침 기준</th>
                                    <th colspan="2" class="p-3 border-r border-gray-200 font-black text-indigo-600 text-[10px] text-center">수량 산출 (기준 / 금회)</th>
                                    <th rowspan="2" class="p-3 font-black text-gray-700 text-[10px] w-[120px] text-center">비 고</th>
                                </tr>
                                <tr class="bg-gray-50 border-b border-gray-200" id="table-sub-header"></tr>
                            </thead>
                            <tbody id="results-body" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 데이터 상수 ---
        const STRUCTURE_INFO = {
            BRIDGE: { name: '교량', icon: 'construction' },
            TUNNEL: { name: '터널', icon: 'map' },
            RETAINING_WALL: { name: '옹벽', icon: 'brick-wall' }
        };

        const INSPECTION_INFO = {
            DETAILED_INSPECTION: { name: '정밀안전점검' },
            DETAILED_DIAGNOSIS: { name: '정밀안전진단' },
            PERFORMANCE_EVAL_1: { name: '1종 성능평가' },
            PERFORMANCE_EVAL_2: { name: '2종 성능평가' }
        };

        const FACILITY_CLASS_INFO = {
            CLASS_1: '1종 시설물', CLASS_2: '2종 시설물', CLASS_3: '3종 시설물', OTHER: '기타'
        };

        const BRIDGE_TYPES = ['STB (강박스)', 'SPG (강플레이트)', 'PSCI (PSC I형)', 'SLAB (RC슬래브)', 'RA (라멘)', '트러스교', '아치교', '현수교', '사장교', '기타'];

        // --- 상태 관리 ---
        let appData = JSON.parse(localStorage.getItem('safety_diag_data')) || {
            facilities: [{
                id: '1',
                name: '기본 시설물 1',
                selectedType: 'BRIDGE',
                inspectionType: 'DETAILED_DIAGNOSIS',
                facilityClass: 'CLASS_1',
                bridgeSpans: [{ id: '1', type: 'STB (강박스)', spanLength: 30, spanCount: 3 }],
                tunnelSections: [{ id: '1', concreteType: 'REINFORCED', length: 500 }],
                retainingWallSections: [{ id: '1', type: 'CONCRETE', length: 100 }],
                evalUnit: 20,
                implQtys: {}
            }],
            currentId: '1'
        };

        function getActiveFacility() {
            const facility = appData.facilities.find(f => f.id === appData.currentId) || appData.facilities[0];
            // 초기화 보장
            if (!facility.bridgeSpans) facility.bridgeSpans = [{ id: '1', type: 'STB (강박스)', spanLength: 30, spanCount: 3 }];
            if (!facility.tunnelSections) facility.tunnelSections = [{ id: '1', concreteType: 'REINFORCED', length: 500 }];
            if (!facility.retainingWallSections) facility.retainingWallSections = [{ id: '1', type: 'CONCRETE', length: 100 }];
            if (!facility.implQtys) facility.implQtys = {};
            if (!facility.evalUnit) facility.evalUnit = 20;
            return facility;
        }

        function saveToLocal() {
            localStorage.setItem('safety_diag_data', JSON.stringify(appData));
        }

        function updateState(updates) {
            const facility = getActiveFacility();
            Object.assign(facility, updates);
            saveToLocal();
            render();
        }

        function addFacility() {
            const newId = Date.now().toString();
            appData.facilities.push({
                id: newId,
                name: `신규 시설물 ${appData.facilities.length + 1}`,
                selectedType: 'BRIDGE',
                inspectionType: 'DETAILED_DIAGNOSIS',
                facilityClass: 'CLASS_1',
                bridgeSpans: [{ id: '1', type: 'STB (강박스)', spanLength: 30, spanCount: 3 }],
                tunnelSections: [{ id: '1', concreteType: 'REINFORCED', length: 500 }],
                retainingWallSections: [{ id: '1', type: 'CONCRETE', length: 100 }],
                evalUnit: 20,
                implQtys: {}
            });
            appData.currentId = newId;
            saveToLocal();
            render();
        }

        function deleteFacility(id, event) {
            event.stopPropagation();
            if (appData.facilities.length <= 1) return alert('최소 하나의 시설물은 있어야 합니다.');
            if (!confirm('이 시설물을 삭제하시겠습니까?')) return;
            appData.facilities = appData.facilities.filter(f => f.id !== id);
            if (appData.currentId === id) appData.currentId = appData.facilities[0].id;
            saveToLocal();
            render();
        }

        function selectFacility(id) {
            appData.currentId = id;
            saveToLocal();
            render();
        }

        function renameFacility(id, newName) {
            const facility = appData.facilities.find(f => f.id === id);
            if (facility) {
                facility.name = newName;
                saveToLocal();
            }
        }

        function addSection(key) {
            const facility = getActiveFacility();
            const newId = Date.now().toString();
            if (key === 'bridgeSpans') facility.bridgeSpans.push({ id: newId, type: 'STB (강박스)', spanLength: 30, spanCount: 1 });
            else if (key === 'tunnelSections') facility.tunnelSections.push({ id: newId, concreteType: 'REINFORCED', length: 100 });
            else if (key === 'retainingWallSections') facility.retainingWallSections.push({ id: newId, type: 'CONCRETE', length: 50 });
            saveToLocal();
            render();
        }

        function removeSection(key, id) {
            const facility = getActiveFacility();
            if (facility[key].length <= 1) return;
            facility[key] = facility[key].filter(s => s.id !== id);
            saveToLocal();
            render();
        }

        function updateSection(key, id, field, value) {
            const facility = getActiveFacility();
            const section = facility[key].find(s => s.id === id);
            if (section) {
                section[field] = (field === 'spanLength' || field === 'spanCount' || field === 'length') ? parseFloat(value) || 0 : value;
                saveToLocal();
                render();
            }
        }

        // --- 계산 로직 ---
        const getAdjustmentRatio = (l) => {
            if (l <= 300) return 1.0;
            if (l <= 500) return 1.0 - (0.2 * (l - 300) / 200);
            if (l <= 1000) return 0.8 - (0.2 * (l - 500) / 500);
            if (l <= 2000) return 0.6 - (0.2 * (l - 1000) / 1000);
            if (l <= 4000) return 0.4 - (0.15 * (l - 2000) / 2000);
            return 0.25;
        };

        const TEST_RULES = {
            BRIDGE: [
                { id: 'rebound', name: '반발경도시험', calculate: (s) => {
                    const totalL = s.bridgeSpans.reduce((acc, sp) => acc + (sp.spanLength * sp.spanCount), 0);
                    const isD = s.inspectionType.includes('DIAGNOSIS') || s.inspectionType.includes('1');
                    const r = getAdjustmentRatio(totalL);
                    const qty = Math.ceil((totalL / 50) * (isD ? 2 : 1) * r);
                    return { upperQty: qty, lowerQty: Math.ceil((totalL / 50) * r), criteria: isD ? '2개소/50m (조정계수 적용)' : '1개소/50m (조정계수 적용)' };
                }},
                { id: 'carbonation', name: '탄산화깊이', calculate: (s) => {
                    const totalSpans = s.bridgeSpans.reduce((acc, sp) => acc + sp.spanCount, 0);
                    const isD = s.inspectionType.includes('DIAGNOSIS') || s.inspectionType.includes('1');
                    const qty = totalSpans < 5 ? (isD ? 2 : 1) : (isD ? 3 : 2);
                    return { upperQty: qty, lowerQty: qty * 2, criteria: '경간수 및 점검종류에 따른 차등' };
                }},
                { id: 'chloride', name: '염화물함유량', calculate: () => ({ upperQty: 1, lowerQty: 2, criteria: '상부 1개소, 하부 2개소 이상' })}
            ],
            TUNNEL: [
                { id: 'rebound', name: '반발경도시험', calculate: (s) => {
                    const totalL = s.tunnelSections.reduce((acc, sec) => acc + sec.length, 0);
                    const isD = s.inspectionType.includes('DIAGNOSIS') || s.inspectionType.includes('1');
                    const qty = Math.ceil(totalL / (isD ? 100 : 300)) * (isD ? 2 : 1);
                    return { upperQty: qty, lowerQty: '-', criteria: isD ? '2개소/100m' : '1개소/300m' };
                }},
                { id: 'carbonation', name: '탄산화깊이', calculate: (s) => {
                    const reinforcedL = s.tunnelSections.filter(sec => sec.concreteType === 'REINFORCED').reduce((acc, sec) => acc + sec.length, 0);
                    const isD = s.inspectionType.includes('DIAGNOSIS') || s.inspectionType.includes('1');
                    const qty = reinforcedL === 0 ? 0 : Math.ceil(reinforcedL / (isD ? 500 : 1000)) + (isD ? 4 : 2);
                    return { upperQty: qty, lowerQty: '-', criteria: '철근구간 연장에 따른 산출' };
                }}
            ],
            RETAINING_WALL: [
                { id: 'rebound', name: '반발경도시험', calculate: (s) => {
                    const totalL = s.retainingWallSections.reduce((acc, sec) => acc + sec.length, 0);
                    const isD = s.inspectionType.includes('DIAGNOSIS') || s.inspectionType.includes('1');
                    const qty = Math.ceil(totalL / (isD ? s.evalUnit : 50));
                    return { upperQty: qty, lowerQty: '-', criteria: isD ? `평가단위(${s.evalUnit}m)당 1개소` : '1개소/50m' };
                }},
                { id: 'carbonation', name: '탄산화깊이', calculate: (s) => {
                    const totalL = s.retainingWallSections.reduce((acc, sec) => acc + sec.length, 0);
                    const isD = s.inspectionType.includes('DIAGNOSIS') || s.inspectionType.includes('1');
                    const qty = totalL < 100 ? 2 : 2 + Math.ceil((totalL - 100) / (isD ? 50 : 100));
                    return { upperQty: qty, lowerQty: '-', criteria: isD ? '100m미만 2개소, 초과시 50m당 1개소' : '100m미만 2개소, 초과시 100m당 1개소' };
                }}
            ]
        };

        // --- 렌더링 함수 ---
        function render() {
            const state = getActiveFacility();

            // 시설물 목록
            const facilityList = document.getElementById('facility-list');
            facilityList.innerHTML = appData.facilities.map(f => `
                <div onclick="selectFacility('${f.id}')" class="group flex items-center justify-between p-2.5 rounded-xl border transition-all cursor-pointer ${appData.currentId === f.id ? 'bg-indigo-50 border-indigo-200' : 'bg-white border-gray-100 hover:border-gray-200'}">
                    <input type="text" value="${f.name}" onchange="renameFacility('${f.id}', this.value)" onclick="event.stopPropagation()" class="bg-transparent border-none text-[11px] font-bold text-gray-700 focus:ring-0 p-0 w-full outline-none">
                    <button onclick="deleteFacility('${f.id}', event)" class="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-all ml-2">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                </div>
            `).join('');

            // 헤더 정보
            document.getElementById('header-title').innerText = state.name;
            document.getElementById('header-badges').innerHTML = `
                <span class="px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-md text-[10px] font-black">${STRUCTURE_INFO[state.selectedType].name}</span>
                <span class="px-2 py-0.5 bg-gray-100 text-gray-700 rounded-md text-[10px] font-black">${INSPECTION_INFO[state.inspectionType].name}</span>
            `;
            document.getElementById('header-icon').setAttribute('data-lucide', STRUCTURE_INFO[state.selectedType].icon);

            // 종류 선택기
            const typeSelector = document.getElementById('type-selector');
            typeSelector.innerHTML = Object.entries(STRUCTURE_INFO).map(([key, info]) => `
                <button onclick="updateState({selectedType: '${key}'})" class="flex flex-col items-center justify-center p-3 rounded-2xl border-2 transition-all ${state.selectedType === key ? 'border-indigo-600 bg-indigo-50 text-indigo-600' : 'border-gray-100 bg-white text-gray-400 hover:border-gray-200'}">
                    <i data-lucide="${info.icon}" class="w-5 h-5 mb-1.5"></i>
                    <span class="text-[10px] font-black">${info.name}</span>
                </button>
            `).join('');

            // 기본 설정
            document.getElementById('inspection-type').innerHTML = Object.entries(INSPECTION_INFO).map(([k, v]) => `<option value="${k}" ${state.inspectionType === k ? 'selected' : ''}>${v.name}</option>`).join('');
            document.getElementById('facility-class').innerHTML = Object.entries(FACILITY_CLASS_INFO).map(([k, v]) => `<option value="${k}" ${state.facilityClass === k ? 'selected' : ''}>${v}</option>`).join('');

            // 동적 입력 필드 및 합계 계산
            const dynamicInputs = document.getElementById('dynamic-inputs');
            if (state.selectedType === 'BRIDGE') {
                const totalL = state.bridgeSpans.reduce((acc, sp) => acc + (sp.spanLength * sp.spanCount), 0);
                dynamicInputs.innerHTML = `
                    <div class="p-3 bg-indigo-600 rounded-2xl text-white mb-4 shadow-lg">
                        <p class="text-[9px] font-black opacity-70 uppercase">Total Length</p>
                        <p class="text-xl font-black">${totalL.toLocaleString()}m</p>
                    </div>
                    ${state.bridgeSpans.map((span, i) => `
                        <div class="p-4 bg-gray-50 border border-gray-200 rounded-2xl space-y-3 relative">
                            <div class="flex items-center justify-between">
                                <span class="text-[9px] font-black text-indigo-600 bg-indigo-100 px-2 py-0.5 rounded uppercase">Span Group #${i+1}</span>
                                <button onclick="removeSection('bridgeSpans', '${span.id}')" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                            </div>
                            <select onchange="updateSection('bridgeSpans', '${span.id}', 'type', this.value)" class="w-full bg-white border border-gray-200 rounded-xl px-2 py-1.5 text-[11px] font-bold outline-none">
                                ${BRIDGE_TYPES.map(t => `<option value="${t}" ${span.type === t ? 'selected' : ''}>${t}</option>`).join('')}
                            </select>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="relative"><input type="number" value="${span.spanLength}" onchange="updateSection('bridgeSpans', '${span.id}', 'spanLength', this.value)" class="w-full bg-white border border-gray-200 rounded-xl px-2 py-1.5 text-[11px] font-bold outline-none"><span class="absolute right-2 top-1/2 -translate-y-1/2 text-[8px] text-gray-400 font-bold">m</span></div>
                                <div class="relative"><input type="number" value="${span.spanCount}" onchange="updateSection('bridgeSpans', '${span.id}', 'spanCount', this.value)" class="w-full bg-white border border-gray-200 rounded-xl px-2 py-1.5 text-[11px] font-bold outline-none"><span class="absolute right-2 top-1/2 -translate-y-1/2 text-[8px] text-gray-400 font-bold">경간</span></div>
                            </div>
                        </div>
                    `).join('')}
                    <button onclick="addSection('bridgeSpans')" class="w-full py-2 bg-indigo-50 text-indigo-600 rounded-xl text-[10px] font-black border border-indigo-100 hover:bg-indigo-100 transition-all">+ 경간 그룹 추가</button>
                `;
            } else if (state.selectedType === 'TUNNEL') {
                const totalL = state.tunnelSections.reduce((acc, sec) => acc + sec.length, 0);
                dynamicInputs.innerHTML = `
                    <div class="p-3 bg-emerald-600 rounded-2xl text-white mb-4 shadow-lg">
                        <p class="text-[9px] font-black opacity-70 uppercase">Total Length</p>
                        <p class="text-xl font-black">${totalL.toLocaleString()}m</p>
                    </div>
                    ${state.tunnelSections.map((sec, i) => `
                        <div class="p-4 bg-gray-50 border border-gray-200 rounded-2xl space-y-3 relative">
                            <div class="flex items-center justify-between">
                                <span class="text-[9px] font-black text-emerald-600 bg-emerald-100 px-2 py-0.5 rounded uppercase">Section #${i+1}</span>
                                <button onclick="removeSection('tunnelSections', '${sec.id}')" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="updateSection('tunnelSections', '${sec.id}', 'concreteType', 'REINFORCED')" class="flex-1 py-1.5 rounded-lg border text-[9px] font-black transition-all ${sec.concreteType === 'REINFORCED' ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-white text-gray-400 border-gray-100'}">철근</button>
                                <button onclick="updateSection('tunnelSections', '${sec.id}', 'concreteType', 'PLAIN')" class="flex-1 py-1.5 rounded-lg border text-[9px] font-black transition-all ${sec.concreteType === 'PLAIN' ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-white text-gray-400 border-gray-100'}">무근</button>
                            </div>
                            <div class="relative"><input type="number" value="${sec.length}" onchange="updateSection('tunnelSections', '${sec.id}', 'length', this.value)" class="w-full bg-white border border-gray-200 rounded-xl px-2 py-1.5 text-[11px] font-bold outline-none"><span class="absolute right-2 top-1/2 -translate-y-1/2 text-[8px] text-gray-400 font-bold">m</span></div>
                        </div>
                    `).join('')}
                    <button onclick="addSection('tunnelSections')" class="w-full py-2 bg-emerald-50 text-emerald-600 rounded-xl text-[10px] font-black border border-emerald-100 hover:bg-emerald-100 transition-all">+ 섹션 추가</button>
                `;
            } else if (state.selectedType === 'RETAINING_WALL') {
                const totalL = state.retainingWallSections.reduce((acc, sec) => acc + sec.length, 0);
                dynamicInputs.innerHTML = `
                    <div class="p-3 bg-orange-600 rounded-2xl text-white mb-4 shadow-lg">
                        <p class="text-[9px] font-black opacity-70 uppercase">Total Length</p>
                        <p class="text-xl font-black">${totalL.toLocaleString()}m</p>
                    </div>
                    ${state.retainingWallSections.map((sec, i) => `
                        <div class="p-4 bg-gray-50 border border-gray-200 rounded-2xl space-y-3 relative">
                            <div class="flex items-center justify-between">
                                <span class="text-[9px] font-black text-orange-600 bg-orange-100 px-2 py-0.5 rounded uppercase">Section #${i+1}</span>
                                <button onclick="removeSection('retainingWallSections', '${sec.id}')" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                            </div>
                            <div class="grid grid-cols-3 gap-1">
                                <button onclick="updateSection('retainingWallSections', '${sec.id}', 'type', 'CONCRETE')" class="py-1.5 rounded-lg border text-[9px] font-black transition-all ${sec.type === 'CONCRETE' ? 'bg-orange-600 text-white border-orange-600' : 'bg-white text-gray-400 border-gray-100'}">콘크리트</button>
                                <button onclick="updateSection('retainingWallSections', '${sec.id}', 'type', 'REINFORCED_SOIL')" class="py-1.5 rounded-lg border text-[9px] font-black transition-all ${sec.type === 'REINFORCED_SOIL' ? 'bg-orange-600 text-white border-orange-600' : 'bg-white text-gray-400 border-gray-100'}">보강토</button>
                                <button onclick="updateSection('retainingWallSections', '${sec.id}', 'type', 'STONE')" class="py-1.5 rounded-lg border text-[9px] font-black transition-all ${sec.type === 'STONE' ? 'bg-orange-600 text-white border-orange-600' : 'bg-white text-gray-400 border-gray-100'}">석축</button>
                            </div>
                            <div class="relative"><input type="number" value="${sec.length}" onchange="updateSection('retainingWallSections', '${sec.id}', 'length', this.value)" class="w-full bg-white border border-gray-200 rounded-xl px-2 py-1.5 text-[11px] font-bold outline-none"><span class="absolute right-2 top-1/2 -translate-y-1/2 text-[8px] text-gray-400 font-bold">m</span></div>
                        </div>
                    `).join('')}
                    <button onclick="addSection('retainingWallSections')" class="w-full py-2 bg-orange-50 text-orange-600 rounded-xl text-[10px] font-black border border-orange-100 hover:bg-orange-100 transition-all">+ 섹션 추가</button>
                    <div class="pt-2">
                        <label class="block text-[9px] font-black text-gray-500 uppercase mb-1">평가단위 (m)</label>
                        <input type="number" value="${state.evalUnit}" onchange="updateState({evalUnit: parseFloat(this.value)||20})" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-xs font-bold outline-none">
                    </div>
                `;
            }

            // 테이블 렌더링
            const isBridge = state.selectedType === 'BRIDGE';
            document.getElementById('table-sub-header').innerHTML = isBridge 
                ? `<th class="p-2 border-r border-gray-200 font-bold text-gray-500 text-[10px] text-center">상부구조</th><th class="p-2 border-r border-gray-200 font-bold text-gray-500 text-[10px] text-center">하부구조</th><th class="p-2 border-r border-gray-200 font-bold text-indigo-600 text-[10px] text-center">상부 (기준/금회)</th><th class="p-2 border-r border-gray-200 font-bold text-indigo-600 text-[10px] text-center">하부 (기준/금회)</th>`
                : `<th colspan="2" class="p-2 border-r border-gray-200 font-bold text-gray-500 text-[10px] text-center">산정 기준</th><th colspan="2" class="p-2 border-r border-gray-200 font-bold text-indigo-600 text-[10px] text-center">수량 산출 (기준 / 금회)</th>`;

            const resultsBody = document.getElementById('results-body');
            const rules = TEST_RULES[state.selectedType];
            resultsBody.innerHTML = rules.map(rule => {
                const res = rule.calculate(state);
                const implU = state.implQtys[rule.id]?.upper || '';
                const implL = state.implQtys[rule.id]?.lower || '';
                
                if (isBridge) {
                    return `
                        <tr class="hover:bg-gray-50/50 transition-all">
                            <td class="p-3 border-r border-gray-100 font-bold text-[11px] text-gray-700">${rule.name}</td>
                            <td class="p-3 border-r border-gray-100 text-[10px] text-gray-500 leading-relaxed whitespace-pre-line">${res.criteria}</td>
                            <td class="p-3 border-r border-gray-100 text-[10px] text-gray-500 leading-relaxed whitespace-pre-line">${res.criteria}</td>
                            <td class="p-3 border-r border-gray-100 text-center">
                                <div class="flex flex-col items-center gap-1">
                                    <span class="text-[10px] font-black text-gray-400">${res.upperQty}</span>
                                    <input type="number" value="${implU}" onchange="updateImplQty('${rule.id}', 'upper', this.value)" class="w-16 bg-indigo-50 border border-indigo-100 rounded-lg px-1 py-0.5 text-[11px] font-black text-indigo-600 text-center outline-none">
                                </div>
                            </td>
                            <td class="p-3 border-r border-gray-100 text-center">
                                <div class="flex flex-col items-center gap-1">
                                    <span class="text-[10px] font-black text-gray-400">${res.lowerQty}</span>
                                    <input type="number" value="${implL}" onchange="updateImplQty('${rule.id}', 'lower', this.value)" class="w-16 bg-indigo-50 border border-indigo-100 rounded-lg px-1 py-0.5 text-[11px] font-black text-indigo-600 text-center outline-none">
                                </div>
                            </td>
                            <td class="p-3 text-[10px] text-gray-400 italic text-center">-</td>
                        </tr>
                    `;
                } else {
                    return `
                        <tr class="hover:bg-gray-50/50 transition-all">
                            <td class="p-3 border-r border-gray-100 font-bold text-[11px] text-gray-700">${rule.name}</td>
                            <td colspan="2" class="p-3 border-r border-gray-100 text-[10px] text-gray-500 leading-relaxed whitespace-pre-line">${res.criteria}</td>
                            <td colspan="2" class="p-3 border-r border-gray-100 text-center">
                                <div class="flex items-center justify-center gap-3">
                                    <span class="text-[10px] font-black text-gray-400">${res.upperQty}</span>
                                    <i data-lucide="arrow-right" class="w-3 h-3 text-gray-300"></i>
                                    <input type="number" value="${implU}" onchange="updateImplQty('${rule.id}', 'upper', this.value)" class="w-20 bg-indigo-50 border border-indigo-100 rounded-xl px-2 py-1 text-[11px] font-black text-indigo-600 text-center outline-none">
                                </div>
                            </td>
                            <td class="p-3 text-[10px] text-gray-400 italic text-center">-</td>
                        </tr>
                    `;
                }
            }).join('');

            lucide.createIcons();
        }

        function updateImplQty(ruleId, type, value) {
            const facility = getActiveFacility();
            if (!facility.implQtys[ruleId]) facility.implQtys[ruleId] = {};
            facility.implQtys[ruleId][type] = value;
            saveToLocal();
            render();
        }

        // 초기 실행
        window.onload = render;
    </script>
</body>
</html>
