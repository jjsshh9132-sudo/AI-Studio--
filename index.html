<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시설물 안전진단 재료시험 산출기</title>
    <!-- 라이브러리 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: #f9fafb; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        .transition-all { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-gray-900 antialiased">
    <div id="app" class="min-h-screen flex flex-col md:flex-row">
        <!-- 사이드바 (설정창) -->
        <aside class="w-full md:w-80 bg-white border-r border-gray-200 flex flex-col shrink-0 shadow-sm overflow-y-auto no-scrollbar h-screen sticky top-0">
            <div class="p-5 border-b border-gray-100 bg-gray-50/50">
                <div class="flex items-center gap-2 mb-1">
                    <div class="bg-indigo-600 p-1.5 rounded-lg shadow-md shadow-indigo-100">
                        <i data-lucide="settings-2" class="w-4 h-4 text-white"></i>
                    </div>
                    <h2 class="text-[11px] font-black text-gray-900 uppercase tracking-tight">시설물 설정</h2>
                </div>
                <p class="text-[9px] text-gray-500 font-bold">제원 및 점검 종류를 선택하세요</p>
            </div>

            <div class="p-5 space-y-6">
                <!-- 시설물 종류 선택 -->
                <section>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">01. 시설물 종류</label>
                    <div class="grid grid-cols-3 gap-2" id="type-selector"></div>
                </section>

                <!-- 기본 설정 -->
                <section class="space-y-4">
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1 tracking-widest">02. 기본 설정</label>
                    <div>
                        <label class="block text-[9px] font-black text-gray-500 uppercase mb-1 ml-0.5">점검 종류</label>
                        <select id="inspection-type" onchange="updateState({inspectionType: this.value})" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-xs font-bold focus:ring-2 focus:ring-indigo-500 outline-none transition-all"></select>
                    </div>
                    <div>
                        <label class="block text-[9px] font-black text-gray-500 uppercase mb-1 ml-0.5">시설물 종별</label>
                        <select id="facility-class" onchange="updateState({facilityClass: this.value})" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-xs font-bold focus:ring-2 focus:ring-indigo-500 outline-none transition-all"></select>
                    </div>
                </section>

                <!-- 세부 제원 입력 -->
                <section class="pt-4 border-t border-gray-100">
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-3 tracking-widest">03. 세부 제원 입력</label>
                    <div id="dynamic-inputs" class="space-y-4"></div>
                </section>
            </div>
        </aside>

        <!-- 메인 콘텐츠 (결과창) -->
        <main class="flex-1 overflow-y-auto p-4 md:p-8">
            <div class="max-w-5xl mx-auto space-y-6">
                <!-- 헤더 카드 -->
                <div class="bg-white rounded-3xl border border-gray-200 p-6 md:p-8 shadow-sm flex flex-col md:flex-row items-center justify-between gap-6 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-50 rounded-full -mr-32 -mt-32 opacity-40"></div>
                    <div class="flex items-center gap-5 relative z-10">
                        <div id="header-icon-container" class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-xl shadow-indigo-100 text-white">
                            <i id="header-icon" data-lucide="calculator" class="w-7 h-7"></i>
                        </div>
                        <div>
                            <h1 id="header-title" class="text-xl md:text-2xl font-black text-gray-900 tracking-tight">시설물 안전진단 산출표</h1>
                            <p class="text-xs text-gray-500 font-bold mt-1">국토안전관리원 세부지침 최신 기준 적용</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 relative z-10">
                        <button onclick="window.print()" class="flex items-center gap-2 px-4 py-2 bg-gray-900 text-white rounded-xl text-xs font-black hover:bg-black transition-all shadow-lg">
                            <i data-lucide="printer" class="w-3.5 h-3.5"></i> 인쇄 / PDF
                        </button>
                    </div>
                </div>

                <!-- 결과 테이블 -->
                <div class="bg-white rounded-3xl border border-gray-200 shadow-xl overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full border-collapse text-left min-w-[800px]">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-200">
                                    <th rowspan="2" class="p-4 border-r border-gray-200 font-black text-gray-700 text-[11px] w-32 text-center">시험 항목</th>
                                    <th colspan="2" class="p-4 border-r border-gray-200 font-black text-gray-700 text-[11px] text-center">세부지침 기준</th>
                                    <th colspan="2" class="p-4 border-r border-gray-200 font-black text-indigo-600 text-[11px] text-center">수량 산출 (기준 / 금회)</th>
                                    <th rowspan="2" class="p-4 font-black text-gray-700 text-[11px] w-36 text-center">비 고</th>
                                </tr>
                                <tr class="bg-gray-50 border-b border-gray-200" id="table-sub-header">
                                    <!-- JS Dynamic -->
                                </tr>
                            </thead>
                            <tbody id="results-body" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 1. 데이터 및 상수 (React 버전과 동일) ---
        const STRUCTURE_INFO = {
            BRIDGE: { name: '교량', icon: 'construction', color: 'blue' },
            TUNNEL: { name: '터널', icon: 'map', color: 'emerald' },
            RETAINING_WALL: { name: '옹벽', icon: 'brick-wall', color: 'orange' }
        };

        const INSPECTION_INFO = {
            DETAILED_INSPECTION: { name: '정밀안전점검' },
            DETAILED_DIAGNOSIS: { name: '정밀안전진단' },
            PERFORMANCE_EVAL_1: { name: '1종 성능평가' },
            PERFORMANCE_EVAL_2: { name: '2종 성능평가' }
        };

        const FACILITY_CLASS_INFO = {
            CLASS_1: '1종 시설물', CLASS_2: '2종 시설물', CLASS_3: '3종 시설물', OTHER: '기타'
        };

        const BRIDGE_TYPES = ['STB (강박스)', 'SPG (강플레이트)', 'PSCI (PSC I형)', 'SLAB (RC슬래브)', 'RA (라멘)', '트러스교', '아치교', '현수교', '사장교', '기타'];

        // --- 2. 상태 관리 ---
        let state = {
            selectedType: 'BRIDGE',
            inspectionType: 'DETAILED_DIAGNOSIS',
            facilityClass: 'CLASS_1',
            bridgeSpans: [{ id: '1', type: 'STB (강박스)', spanLength: 30, spanCount: 3, girderCount: 5 }],
            tunnelSections: [{ id: '1', type: '표준단면', length: 500, concreteType: 'REINFORCED' }],
            retainingWallTotalLength: 100,
            retainingWallType: 'CONCRETE',
            evalUnit: 20,
            implQtys: {} // { ruleId: { upper: val, lower: val } }
        };

        // --- 3. 계산 로직 (React 버전의 constants.ts 로직 이식) ---
        const getAdjustmentRatio = (l) => {
            if (l <= 300) return 1.0;
            if (l <= 500) return Number((1.0 - (0.2 * (l - 300) / 200)).toFixed(3));
            if (l <= 1000) return Number((0.8 - (0.2 * (l - 500) / 500)).toFixed(3));
            if (l <= 2000) return Number((0.6 - (0.2 * (l - 1000) / 1000)).toFixed(3));
            if (l <= 4000) return Number((0.4 - (0.15 * (l - 2000) / 2000)).toFixed(3));
            return 0.25;
        };

        const isSteel = (t) => t.includes('강') || t.includes('STB') || t.includes('SPG') || t.includes('트러스');

        const TEST_RULES = {
            BRIDGE: [
                {
                    id: 'rebound', name: '반발경도시험', unit: '개소', category: 'BASIC',
                    calculate: (s) => {
                        const isD = s.inspectionType === 'DETAILED_DIAGNOSIS' || s.inspectionType === 'PERFORMANCE_EVAL_1';
                        const totalL = s.bridgeSpans.reduce((acc, sp) => acc + sp.spanLength * sp.spanCount, 0);
                        const r = getAdjustmentRatio(totalL);
                        const uQty = Math.ceil((totalL / 50) * (isD ? 2 : 1) * r);
                        const lQty = Math.ceil((totalL / 50) * r);
                        return { upperQty: uQty, lowerQty: lQty, upperCriteria: isD ? '2개소/50m' : '1개소/50m', lowerCriteria: '1개소/50m', adjustmentRatio: r };
                    }
                },
                {
                    id: 'carbonation', name: '탄산화깊이 측정', unit: '개소', category: 'BASIC',
                    calculate: (s) => {
                        const isD = s.inspectionType === 'DETAILED_DIAGNOSIS' || s.inspectionType === 'PERFORMANCE_EVAL_1';
                        const totalSpans = s.bridgeSpans.reduce((acc, sp) => acc + sp.spanCount, 0);
                        const isSmall = totalSpans <= 5;
                        const uQty = isD ? (isSmall ? 2 : 3) : (isSmall ? 1 : 2);
                        const lQty = isD ? (isSmall ? 4 : 6) : (isSmall ? 2 : 4);
                        return { upperQty: uQty, lowerQty: lQty, upperCriteria: isSmall ? '2개소' : '3개소', lowerCriteria: isSmall ? '4개소' : '6개소' };
                    }
                },
                {
                    id: 'chloride', name: '염화물 함유량', unit: '개소', category: 'BASIC',
                    calculate: (s) => ({ upperQty: 1, lowerQty: 2, upperCriteria: '1개소 이상', lowerCriteria: '2개소 이상' })
                }
            ],
            TUNNEL: [
                {
                    id: 'rebound', name: '반발경도시험', unit: '개소', category: 'BASIC',
                    calculate: (s) => {
                        const totalL = s.tunnelSections.reduce((acc, sec) => acc + sec.length, 0);
                        const qty = Math.ceil(totalL / 100) * 2;
                        return { upperQty: qty, lowerQty: '-', upperCriteria: '2개소/100m' };
                    }
                },
                {
                    id: 'carbonation', name: '탄산화깊이 측정', unit: '개소', category: 'BASIC',
                    calculate: (s) => {
                        const totalL = s.tunnelSections.reduce((acc, sec) => acc + sec.length, 0);
                        const qty = totalL < 1000 ? 4 : 4 + Math.ceil((totalL - 1000) / 500);
                        return { upperQty: qty, lowerQty: '-', upperCriteria: '연장별 차등' };
                    }
                }
            ],
            RETAINING_WALL: [
                {
                    id: 'rebound', name: '반발경도시험', unit: '개소', category: 'BASIC',
                    calculate: (s) => {
                        const qty = Math.ceil(s.retainingWallTotalLength / s.evalUnit);
                        return { upperQty: qty, lowerQty: '-', upperCriteria: `1개소/${s.evalUnit}m` };
                    }
                },
                {
                    id: 'carbonation', name: '탄산화깊이 측정', unit: '개소', category: 'BASIC',
                    calculate: (s) => {
                        if (s.retainingWallType === 'STONE') return { upperQty: '-', lowerQty: '-', upperCriteria: '해당없음' };
                        const qty = s.retainingWallTotalLength < 100 ? 2 : 2 + Math.ceil((s.retainingWallTotalLength - 100) / 50);
                        return { upperQty: qty, lowerQty: '-', upperCriteria: '연장별 차등' };
                    }
                },
                {
                    id: 'stone_strength', name: '견치돌 추정강도', unit: '개소', category: 'BASIC',
                    calculate: (s) => {
                        if (s.retainingWallType !== 'STONE') return { upperQty: '-', lowerQty: '-', upperCriteria: '해당없음' };
                        const qty = Math.ceil(s.retainingWallTotalLength / s.evalUnit);
                        return { upperQty: qty, lowerQty: '-', upperCriteria: `1개소/${s.evalUnit}m` };
                    }
                }
            ]
        };

        // --- 4. UI 렌더링 엔진 ---
        function updateState(updates) {
            state = { ...state, ...updates };
            render();
        }

        function render() {
            // 1. 시설물 종류 버튼
            const typeSelector = document.getElementById('type-selector');
            typeSelector.innerHTML = Object.entries(STRUCTURE_INFO).map(([key, info]) => `
                <button onclick="updateState({selectedType: '${key}'})" class="flex flex-col items-center justify-center p-3 rounded-2xl border-2 transition-all active:scale-95 ${state.selectedType === key ? 'border-indigo-600 bg-indigo-50 text-indigo-600 shadow-lg shadow-indigo-100' : 'border-gray-100 bg-white text-gray-400 hover:border-gray-200'}">
                    <i data-lucide="${info.icon}" class="w-5 h-5 mb-1.5"></i>
                    <span class="text-[10px] font-black">${info.name}</span>
                </button>
            `).join('');

            // 2. 셀렉트 박스 옵션 채우기
            const insSelect = document.getElementById('inspection-type');
            insSelect.innerHTML = Object.entries(INSPECTION_INFO).map(([k, v]) => `<option value="${k}" ${state.inspectionType === k ? 'selected' : ''}>${v.name}</option>`).join('');
            
            const clsSelect = document.getElementById('facility-class');
            clsSelect.innerHTML = Object.entries(FACILITY_CLASS_INFO).map(([k, v]) => `<option value="${k}" ${state.facilityClass === k ? 'selected' : ''}>${v}</option>`).join('');

            // 3. 동적 입력 필드 (교량/터널/옹벽)
            const dynamicInputs = document.getElementById('dynamic-inputs');
            if (state.selectedType === 'BRIDGE') {
                dynamicInputs.innerHTML = `
                    <div class="space-y-3">
                        ${state.bridgeSpans.map((span, i) => `
                            <div class="p-4 bg-gray-50 border border-gray-200 rounded-2xl space-y-3 relative group">
                                <div class="flex items-center justify-between">
                                    <span class="text-[9px] font-black text-indigo-600 bg-indigo-100 px-2 py-0.5 rounded uppercase">Span #${i+1}</span>
                                    <button onclick="removeSpan('${span.id}')" class="text-gray-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                                </div>
                                <select onchange="updateSpan('${span.id}', 'type', this.value)" class="w-full bg-white border border-gray-200 rounded-xl px-2 py-1.5 text-[11px] font-bold outline-none">
                                    ${BRIDGE_TYPES.map(t => `<option value="${t}" ${span.type === t ? 'selected' : ''}>${t}</option>`).join('')}
                                </select>
                                <div class="grid grid-cols-2 gap-2">
                                    <div class="relative">
                                        <input type="number" value="${span.spanLength}" onchange="updateSpan('${span.id}', 'spanLength', this.value)" class="w-full bg-white border border-gray-200 rounded-xl px-2 py-1.5 text-[11px] font-bold outline-none">
                                        <span class="absolute right-2 top-1/2 -translate-y-1/2 text-[8px] text-gray-400 font-bold">m</span>
                                    </div>
                                    <div class="relative">
                                        <input type="number" value="${span.spanCount}" onchange="updateSpan('${span.id}', 'spanCount', this.value)" class="w-full bg-white border border-gray-200 rounded-xl px-2 py-1.5 text-[11px] font-bold outline-none">
                                        <span class="absolute right-2 top-1/2 -translate-y-1/2 text-[8px] text-gray-400 font-bold">경간</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                        <button onclick="addSpan()" class="w-full py-2 bg-indigo-50 text-indigo-600 rounded-xl text-[10px] font-black border border-indigo-100 hover:bg-indigo-100 transition-all">+ 경간 추가</button>
                    </div>
                `;
            } else if (state.selectedType === 'RETAINING_WALL') {
                dynamicInputs.innerHTML = `
                    <div class="space-y-4">
                        <div class="grid grid-cols-3 gap-1">
                            <button onclick="updateState({retainingWallType: 'CONCRETE'})" class="py-2 rounded-xl border text-[10px] font-black transition-all ${state.retainingWallType === 'CONCRETE' ? 'bg-orange-600 text-white border-orange-600' : 'bg-white text-gray-400 border-gray-100'}">콘크리트</button>
                            <button onclick="updateState({retainingWallType: 'REINFORCED_SOIL'})" class="py-2 rounded-xl border text-[10px] font-black transition-all ${state.retainingWallType === 'REINFORCED_SOIL' ? 'bg-orange-600 text-white border-orange-600' : 'bg-white text-gray-400 border-gray-100'}">보강토</button>
                            <button onclick="updateState({retainingWallType: 'STONE'})" class="py-2 rounded-xl border text-[10px] font-black transition-all ${state.retainingWallType === 'STONE' ? 'bg-orange-600 text-white border-orange-600' : 'bg-white text-gray-400 border-gray-100'}">석축</button>
                        </div>
                        <div>
                            <label class="block text-[9px] font-black text-gray-500 uppercase mb-1">총 연장 (m)</label>
                            <input type="number" value="${state.retainingWallTotalLength}" onchange="updateState({retainingWallTotalLength: parseFloat(this.value)||0})" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-xs font-bold outline-none">
                        </div>
                        <div>
                            <label class="block text-[9px] font-black text-gray-500 uppercase mb-1">평가단위 (m)</label>
                            <input type="number" value="${state.evalUnit}" onchange="updateState({evalUnit: parseFloat(this.value)||20})" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-xs font-bold outline-none">
                        </div>
                    </div>
                `;
            } else {
                dynamicInputs.innerHTML = `
                    <div>
                        <label class="block text-[9px] font-black text-gray-500 uppercase mb-1">터널 총 연장 (m)</label>
                        <input type="number" value="${state.tunnelSections[0].length}" onchange="const s=[...state.tunnelSections];s[0].length=parseFloat(this.value)||0;updateState({tunnelSections: s})" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5 text-xs font-bold outline-none">
                    </div>
                `;
            }

            // 4. 테이블 헤더 조정
            const subHeader = document.getElementById('table-sub-header');
            if (state.selectedType === 'BRIDGE') {
                subHeader.innerHTML = `
                    <th class="p-2 border-r border-gray-200 font-bold text-gray-500 text-[10px] text-center">상부구조</th>
                    <th class="p-2 border-r border-gray-200 font-bold text-gray-500 text-[10px] text-center">하부구조</th>
                    <th class="p-2 border-r border-gray-200 font-bold text-indigo-600 text-[10px] text-center">상부 (기준/금회)</th>
                    <th class="p-2 border-r border-gray-200 font-bold text-indigo-600 text-[10px] text-center">하부 (기준/금회)</th>
                `;
            } else {
                subHeader.innerHTML = `
                    <th colspan="2" class="p-2 border-r border-gray-200 font-bold text-gray-500 text-[10px] text-center">산정 기준</th>
                    <th colspan="2" class="p-2 border-r border-gray-200 font-bold text-indigo-600 text-[10px] text-center">수량 산출 (기준 / 금회)</th>
                `;
            }

            // 5. 결과 테이블 바디
            const resultsBody = document.getElementById('results-body');
            const rules = TEST_RULES[state.selectedType];
            resultsBody.innerHTML = rules.map(rule => {
                const res = rule.calculate(state);
                const isBridge = state.selectedType === 'BRIDGE';
                
                return `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="p-4 border-r border-gray-200 font-bold text-gray-900 text-[10px] text-center">${rule.name}</td>
                        ${isBridge ? `
                            <td class="p-3 border-r border-gray-200 text-[9px] text-gray-500 text-center">${res.upperCriteria || '-'}</td>
                            <td class="p-3 border-r border-gray-200 text-[9px] text-gray-500 text-center">${res.lowerCriteria || '-'}</td>
                            <td class="p-3 border-r border-gray-200 text-center">
                                <div class="flex flex-col items-center gap-1">
                                    <span class="text-indigo-600 font-black text-[11px]">${res.upperQty}</span>
                                    <input type="text" value="${state.implQtys[rule.id]?.upper || res.upperQty}" onchange="updateImplQty('${rule.id}', 'upper', this.value)" class="w-12 bg-indigo-50 border border-indigo-100 rounded text-center text-[10px] font-bold text-indigo-700 outline-none">
                                </div>
                            </td>
                            <td class="p-3 border-r border-gray-200 text-center">
                                <div class="flex flex-col items-center gap-1">
                                    <span class="text-indigo-600 font-black text-[11px]">${res.lowerQty}</span>
                                    <input type="text" value="${state.implQtys[rule.id]?.lower || res.lowerQty}" onchange="updateImplQty('${rule.id}', 'lower', this.value)" class="w-12 bg-indigo-50 border border-indigo-100 rounded text-center text-[10px] font-bold text-indigo-700 outline-none">
                                </div>
                            </td>
                        ` : `
                            <td colspan="2" class="p-3 border-r border-gray-200 text-[9px] text-gray-500 text-center">${res.upperCriteria || '-'}</td>
                            <td colspan="2" class="p-3 border-r border-gray-200 text-center">
                                <div class="flex flex-col items-center gap-1">
                                    <span class="text-indigo-600 font-black text-[11px]">${res.upperQty}</span>
                                    <input type="text" value="${state.implQtys[rule.id]?.upper || res.upperQty}" onchange="updateImplQty('${rule.id}', 'upper', this.value)" class="w-12 bg-indigo-50 border border-indigo-100 rounded text-center text-[10px] font-bold text-indigo-700 outline-none">
                                </div>
                            </td>
                        `}
                        <td class="p-3 text-[9px] text-gray-400 text-center italic">지침 기준 준수</td>
                    </tr>
                `;
            }).join('');

            // 아이콘 다시 로드
            lucide.createIcons();
        }

        // --- 5. 헬퍼 함수 ---
        function addSpan() {
            const id = Math.random().toString(36).substr(2, 9);
            updateState({ bridgeSpans: [...state.bridgeSpans, { id, type: 'STB (강박스)', spanLength: 30, spanCount: 1, girderCount: 5 }] });
        }
        function removeSpan(id) {
            if (state.bridgeSpans.length > 1) updateState({ bridgeSpans: state.bridgeSpans.filter(s => s.id !== id) });
        }
        function updateSpan(id, field, value) {
            const bridgeSpans = state.bridgeSpans.map(s => s.id === id ? { ...s, [field]: field === 'type' ? value : parseFloat(value) || 0 } : s);
            updateState({ bridgeSpans });
        }
        function updateImplQty(ruleId, part, value) {
            const implQtys = { ...state.implQtys };
            if (!implQtys[ruleId]) implQtys[ruleId] = {};
            implQtys[ruleId][part] = value;
            state.implQtys = implQtys;
        }

        // 초기 실행
        render();
    </script>
</body>
</html>
