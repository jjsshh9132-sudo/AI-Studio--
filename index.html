<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시설물 안전진단 재료시험 산출기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="text-gray-900 antialiased">
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
            <div class="max-w-[1600px] mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white text-xl shadow-lg shadow-blue-200">📊</div>
                    <div>
                        <h1 class="text-lg font-black text-gray-900 leading-none">시설물 안전진단 산출기</h1>
                        <p class="text-[10px] text-gray-400 font-bold mt-1 uppercase tracking-wider">Safety Inspection Quantity Calculator</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="px-2 py-1 bg-blue-50 text-blue-600 text-[10px] font-black rounded-md border border-blue-100">VANILLA JS v1.0</span>
                </div>
            </div>
        </header>

        <main class="flex-1 flex overflow-hidden">
            <!-- Sidebar -->
            <aside class="w-80 border-r border-gray-200 bg-white overflow-y-auto flex flex-col">
                <div class="p-4 space-y-6">
                    <section>
                        <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-3 block">시설물 종류</label>
                        <div class="grid grid-cols-3 gap-2" id="type-selector"></div>
                    </section>
                    <section class="space-y-4">
                        <div>
                            <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-2 block">점검 종류</label>
                            <select id="inspection-type" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-xs font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                <option value="DETAILED_INSPECTION">정밀안전점검</option>
                                <option value="DETAILED_DIAGNOSIS" selected>정밀안전진단</option>
                                <option value="PERFORMANCE_EVAL_1">1종 성능평가</option>
                                <option value="PERFORMANCE_EVAL_2">2종 성능평가</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-2 block">시설물 종별</label>
                            <select id="facility-class" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-xs font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                <option value="CLASS_1">1종 시설물</option>
                                <option value="CLASS_2">2종 시설물</option>
                                <option value="CLASS_3">3종 시설물</option>
                                <option value="OTHER">기타 시설물</option>
                            </select>
                        </div>
                    </section>
                    <div id="dynamic-inputs" class="space-y-6 pt-4 border-t border-gray-100"></div>
                </div>
            </aside>

            <!-- Content Area -->
            <div class="flex-1 bg-gray-50 overflow-y-auto p-6">
                <div class="max-w-[1200px] mx-auto space-y-6">
                    <div class="bg-white rounded-2xl border border-gray-200 p-6 shadow-sm flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div id="summary-icon" class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-2xl">🌉</div>
                            <div>
                                <h2 id="summary-title" class="text-xl font-black text-gray-900">교량 안전진단 산출표</h2>
                                <p id="summary-desc" class="text-xs text-gray-500 font-medium mt-1">시설물 정보에 따른 재료시험 기준 수량 자동 산출</p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                        <table class="w-full border-collapse text-left">
                            <thead>
                                <tr>
                                    <th rowspan="2" class="p-3 border-r border-b border-gray-200 bg-gray-50 text-gray-700 font-black text-[11px] w-[12%] text-center">구 분</th>
                                    <th colspan="2" class="p-3 border-r border-b border-gray-200 bg-gray-50 text-gray-700 font-black text-[11px] text-center">세부지침 기준</th>
                                    <th colspan="2" class="p-3 border-r border-b border-gray-200 bg-gray-50 text-gray-700 font-black text-[11px] text-center">수량 산출 (기준 / 금회)</th>
                                    <th rowspan="2" class="p-3 border-b border-gray-200 bg-gray-50 text-gray-700 font-black text-[11px] w-[15%] text-center">비 고</th>
                                </tr>
                                <tr>
                                    <th class="p-2 border-r border-b border-gray-200 bg-gray-50 text-gray-500 font-bold text-[10px] w-[18%] text-center">상부구조</th>
                                    <th class="p-2 border-r border-b border-gray-200 bg-gray-50 text-gray-500 font-bold text-[10px] w-[18%] text-center">하부구조</th>
                                    <th class="p-2 border-r border-b border-gray-200 bg-blue-50 text-blue-600 font-black text-[10px] w-[18%] text-center">상부 (기준/금회)</th>
                                    <th class="p-2 border-r border-b border-gray-200 bg-blue-50 text-blue-600 font-black text-[10px] w-[18%] text-center">하부 (기준/금회)</th>
                                </tr>
                            </thead>
                            <tbody id="results-body" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                    <div id="footnotes" class="space-y-1 px-1"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const STRUCTURE_INFO = {
            BRIDGE: { name: '교량', icon: '🌉' },
            TUNNEL: { name: '터널', icon: '🚇' },
            RETAINING_WALL: { name: '옹벽', icon: '🧱' },
        };

        const BRIDGE_TYPES = ['STB (강박스)', 'SPG (강플레이트)', 'PSCI (PSC I형)', 'SLAB (RC슬래브)', 'RA (라멘)', '트러스교', '아치교', '현수교', '사장교', '기타'];

        let state = {
            selectedType: 'BRIDGE',
            inspectionType: 'DETAILED_DIAGNOSIS',
            facilityClass: 'CLASS_1',
            bridgeSpans: [{ id: '1', type: 'STB (강박스)', spanLength: 30, spanCount: 3, girderCount: 5 }],
            tunnelTotalLength: 100,
            retainingWallTotalArea: 1000,
            implQtys: {}
        };

        const calcByLength = (l, d) => Math.max(1, Math.ceil(l / d));
        const getRatio = (l) => {
            if (l <= 300) return 1.0;
            if (l <= 500) return Number((1.0 - (0.2 * (l - 300) / 200)).toFixed(3));
            if (l <= 1000) return Number((0.8 - (0.2 * (l - 500) / 500)).toFixed(3));
            if (l <= 2000) return Number((0.6 - (0.2 * (l - 1000) / 1000)).toFixed(3));
            return 0.25;
        };
        const isSteel = (t) => t.includes('강') || t.includes('STB') || t.includes('SPG') || t.includes('트러스');

        const RULES = {
            BRIDGE: [
                {
                    id: 'rebound', name: '반발경도시험', calculate: (s) => {
                        const isD = s.inspectionType.includes('DIAGNOSIS') || s.inspectionType.includes('EVAL_1');
                        const l = s.bridgeSpans.reduce((a, v) => a + v.spanLength * v.spanCount, 0);
                        const r = getRatio(l);
                        const uB = {}, lB = {};
                        const rcL = s.bridgeSpans.filter(v => !isSteel(v.type)).reduce((a, v) => a + v.spanLength * v.spanCount, 0);
                        const stL = s.bridgeSpans.filter(v => isSteel(v.type)).reduce((a, v) => a + v.spanLength * v.spanCount, 0);
                        if (rcL > 0) {
                            const total = Math.ceil(calcByLength(rcL, 50) * (isD ? 2 : 1) * r);
                            s.bridgeSpans.filter(v => !isSteel(v.type)).forEach((v, i, arr) => {
                                const k = `${v.type} (${v.spanLength}m×${v.spanCount}경간)`;
                                if (i === arr.length - 1) uB[k] = total - Object.values(uB).reduce((a, b) => a + b, 0);
                                else uB[k] = Math.round(total * (v.spanLength * v.spanCount / rcL));
                            });
                        }
                        const totalL = Math.ceil(calcByLength(l, 50) * r);
                        s.bridgeSpans.forEach((v, i, arr) => {
                            const k = `${v.type} (${v.spanLength}m×${v.spanCount}경간)`;
                            if (i === arr.length - 1) lB[k] = totalL - Object.values(lB).reduce((a, b) => a + b, 0);
                            else lB[k] = Math.round(totalL * (v.spanLength * v.spanCount / l));
                        });
                        return { upperQty: uB, lowerQty: lB, upperCriteria: isD ? 'RC: 2개소/50m, 강재: 1개소/50m' : '1개소/50m', lowerCriteria: '1개소/연장 50m', adjustmentRatio: r };
                    }
                },
                { id: 'carbonation', name: '탄산화깊이 측정', calculate: (s) => {
                    const isD = s.inspectionType.includes('DIAGNOSIS') || s.inspectionType.includes('EVAL_1');
                    const cnt = s.bridgeSpans.reduce((a, v) => a + v.spanCount, 0);
                    const bU = isD ? (cnt <= 5 ? 2 : 3) : (cnt <= 5 ? 1 : 2);
                    const bL = isD ? (cnt <= 5 ? 4 : 6) : (cnt <= 5 ? 2 : 4);
                    const uB = {}, lB = {};
                    s.bridgeSpans.forEach((v, i, arr) => {
                        const k = `${v.type} (${v.spanLength}m×${v.spanCount}경간)`;
                        if (i === arr.length - 1) { uB[k] = bU - Object.values(uB).reduce((a, b) => a + b, 0); lB[k] = bL - Object.values(lB).reduce((a, b) => a + b, 0); }
                        else { uB[k] = Math.round(bU * v.spanCount / cnt); lB[k] = Math.round(bL * v.spanCount / cnt); }
                    });
                    return { upperQty: uB, lowerQty: lB, upperCriteria: '5경간 기준 산출', lowerCriteria: '5경간 기준 산출' };
                }}
            ]
        };

        function render() {
            const typeSel = document.getElementById('type-selector');
            typeSel.innerHTML = Object.entries(STRUCTURE_INFO).map(([k, v]) => `
                <button onclick="state.selectedType='${k}';render();" class="flex flex-col items-center p-3 rounded-xl border-2 ${state.selectedType === k ? 'border-blue-600 bg-blue-50 text-blue-600' : 'border-gray-100 bg-gray-50 text-gray-400'}">
                    <span class="text-xl">${v.icon}</span><span class="text-[10px] font-black">${v.name}</span>
                </button>`).join('');

            const dynIn = document.getElementById('dynamic-inputs');
            if (state.selectedType === 'BRIDGE') {
                dynIn.innerHTML = `<div class="flex justify-between items-center mb-2"><label class="text-[11px] font-black text-gray-400 uppercase">경간 정보</label><button onclick="state.bridgeSpans.push({id:Date.now(),type:'STB (강박스)',spanLength:30,spanCount:1,girderCount:5});render();" class="w-6 h-6 bg-blue-600 text-white rounded-md">➕</button></div>` + 
                state.bridgeSpans.map(s => `
                    <div class="p-3 bg-gray-50 border border-gray-200 rounded-xl space-y-2 relative group">
                        <button onclick="state.bridgeSpans=state.bridgeSpans.filter(v=>v.id!=='${s.id}');render();" class="absolute -top-2 -right-2 w-5 h-5 bg-red-500 text-white rounded-full text-[10px]">🗑️</button>
                        <select onchange="const sp=state.bridgeSpans.find(v=>v.id==='${s.id}');sp.type=this.value;render();" class="w-full bg-white border border-gray-200 rounded-md px-2 py-1 text-[10px] font-bold">
                            ${BRIDGE_TYPES.map(t => `<option value="${t}" ${s.type === t ? 'selected' : ''}>${t}</option>`).join('')}
                        </select>
                        <div class="grid grid-cols-3 gap-2">
                            <input type="number" value="${s.spanLength}" onchange="const sp=state.bridgeSpans.find(v=>v.id==='${s.id}');sp.spanLength=Number(this.value);render();" class="w-full border rounded p-1 text-[10px]">
                            <input type="number" value="${s.spanCount}" onchange="const sp=state.bridgeSpans.find(v=>v.id==='${s.id}');sp.spanCount=Number(this.value);render();" class="w-full border rounded p-1 text-[10px]">
                            <input type="number" value="${s.girderCount}" onchange="const sp=state.bridgeSpans.find(v=>v.id==='${s.id}');sp.girderCount=Number(this.value);render();" class="w-full border rounded p-1 text-[10px]">
                        </div>
                    </div>`).join('');
            }

            const body = document.getElementById('results-body');
            body.innerHTML = (RULES[state.selectedType] || []).map(r => {
                const res = r.calculate(state);
                const renderQ = (q, id, p) => {
                    if (typeof q === 'object') return Object.entries(q).map(([k, v]) => `<div class="flex justify-between text-[8px] border-b border-gray-50"><span>${k}</span><span class="text-blue-600 font-bold">${v}</span></div>`).join('') + `<div class="flex justify-between text-[10px] font-black text-blue-800 mt-1"><span>TOTAL</span><span>${Object.values(q).reduce((a, b) => a + b, 0)}</span></div>`;
                    return `<span class="text-blue-700 font-bold">${q}</span>`;
                };
                return `<tr>
                    <td class="p-2 border-r text-center text-[9px] font-bold">${r.name}</td>
                    <td class="p-2 border-r text-[9px] text-gray-500">${res.upperCriteria || '-'}</td>
                    <td class="p-2 border-r text-[9px] text-gray-500">${res.lowerCriteria || '-'}</td>
                    <td class="p-2 border-r text-[9px]">${renderQ(res.upperQty)}</td>
                    <td class="p-2 border-r text-[9px]">${renderQ(res.lowerQty)}</td>
                    <td class="p-2 text-[9px] text-gray-400">-</td>
                </tr>`;
            }).join('');
        }

        document.getElementById('inspection-type').onchange = (e) => { state.inspectionType = e.target.value; render(); };
        document.getElementById('facility-class').onchange = (e) => { state.facilityClass = e.target.value; render(); };
        render();
    </script>
</body>
</html>
