<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시설물 안전진단 재료시험 산출기 (Single File)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .transition-all {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .table-fixed {
            table-layout: fixed;
        }
    </style>
</head>
<body class="text-gray-900 antialiased">
    <div id="app" class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
            <div class="max-w-[1600px] mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white text-xl shadow-lg shadow-blue-200">
                        📊
                    </div>
                    <div>
                        <h1 class="text-lg font-black text-gray-900 leading-none">시설물 안전진단 산출기</h1>
                        <p class="text-[10px] text-gray-400 font-bold mt-1 uppercase tracking-wider">Safety & Maintenance Guidelines Compliance</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="exportData()" class="flex items-center gap-2 px-4 py-2 bg-[#111827] text-white rounded-xl text-xs font-black hover:bg-black transition-all active:scale-95 shadow-md">
                        💾 데이터 출력
                    </button>
                    <span class="px-2 py-1 bg-blue-50 text-blue-600 text-[10px] font-black rounded-md border border-blue-100">v3.0.0 FULL</span>
                </div>
            </div>
        </header>

        <main class="flex-1 flex overflow-hidden">
            <!-- Sidebar (Inputs) -->
            <aside class="w-80 border-r border-gray-200 bg-white overflow-y-auto no-scrollbar flex flex-col shadow-sm">
                <div class="p-5 space-y-8">
                    <!-- 01. 시설물 종류 -->
                    <section>
                        <div class="flex items-center gap-2 mb-4">
                            <span class="bg-blue-600 text-white text-[10px] font-black px-1.5 py-0.5 rounded">01</span>
                            <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest">시설물 종류</label>
                        </div>
                        <div class="grid grid-cols-3 gap-2" id="type-selector">
                            <!-- JS Injected -->
                        </div>
                    </section>

                    <!-- 02. 기본 설정 -->
                    <section class="space-y-5">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="bg-blue-600 text-white text-[10px] font-black px-1.5 py-0.5 rounded">02</span>
                            <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest">기본 설정</label>
                        </div>
                        <div>
                            <label class="block text-[9px] font-black text-[#6B7280] uppercase mb-1 ml-0.5 tracking-wider">점검 종류</label>
                            <select id="inspection-type" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2.5 text-xs font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm">
                                <option value="DETAILED_INSPECTION">정밀안전점검</option>
                                <option value="DETAILED_DIAGNOSIS" selected>정밀안전진단</option>
                                <option value="PERFORMANCE_EVAL_1">1종 성능평가</option>
                                <option value="PERFORMANCE_EVAL_2">2종 성능평가</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[9px] font-black text-[#6B7280] uppercase mb-1 ml-0.5 tracking-wider">시설물 종별</label>
                            <select id="facility-class" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2.5 text-xs font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm">
                                <option value="CLASS_1">1종 시설물</option>
                                <option value="CLASS_2">2종 시설물</option>
                                <option value="CLASS_3">3종 시설물</option>
                                <option value="OTHER">기타 시설물</option>
                            </select>
                        </div>
                    </section>

                    <!-- 03. 세부 정보 입력 -->
                    <section id="dynamic-inputs-container" class="space-y-6 pt-6 border-t border-gray-100">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="bg-blue-600 text-white text-[10px] font-black px-1.5 py-0.5 rounded">03</span>
                            <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest">세부 정보 입력</label>
                        </div>
                        <div id="dynamic-inputs" class="space-y-6">
                            <!-- JS Injected -->
                        </div>
                    </section>
                </div>
            </aside>

            <!-- Content Area -->
            <div class="flex-1 bg-gray-50 overflow-y-auto p-8">
                <div class="max-w-[1300px] mx-auto space-y-8">
                    <!-- Summary Card -->
                    <div class="bg-white rounded-3xl border border-gray-200 p-8 shadow-sm flex items-center justify-between relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-64 h-64 bg-blue-50 rounded-full -mr-32 -mt-32 opacity-50"></div>
                        <div class="flex items-center gap-6 relative z-10">
                            <div id="summary-icon" class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-3xl shadow-xl shadow-blue-100 text-white">
                                🌉
                            </div>
                            <div>
                                <h2 id="summary-title" class="text-2xl font-black text-gray-900 tracking-tight">교량 안전진단 산출표</h2>
                                <p id="summary-desc" class="text-sm text-gray-500 font-bold mt-1">시설물 정보에 따른 재료시험 기준 수량 자동 산출</p>
                            </div>
                        </div>
                        <div class="text-right relative z-10">
                            <p class="text-[10px] text-gray-400 font-black uppercase tracking-[0.2em] mb-2">Real-time Calculation</p>
                            <div class="flex items-center gap-2 justify-end">
                                <span class="px-4 py-1.5 bg-green-50 text-green-600 text-[11px] font-black rounded-full border border-green-100 shadow-sm">시스템 정상 작동 중</span>
                            </div>
                        </div>
                    </div>

                    <!-- Results Table -->
                    <div class="bg-white rounded-3xl border border-gray-200 shadow-xl overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full border-collapse text-left table-fixed">
                                <thead>
                                    <tr class="bg-gray-50 border-b border-gray-200">
                                        <th rowspan="2" class="p-4 border-r border-gray-200 font-black text-gray-700 text-[11px] w-[110px] text-center">구 분</th>
                                        <th colspan="2" class="p-4 border-r border-gray-200 font-black text-gray-700 text-[11px] text-center">세부지침 기준</th>
                                        <th colspan="2" class="p-4 border-r border-gray-200 font-black text-gray-700 text-[11px] text-center">수량 산출 (기준 / 금회)</th>
                                        <th rowspan="2" class="p-4 font-black text-gray-700 text-[11px] w-[140px] text-center">비 고</th>
                                    </tr>
                                    <tr class="bg-gray-50 border-b border-gray-200">
                                        <th id="th-upper-criteria" class="p-3 border-r border-gray-200 font-bold text-gray-500 text-[10px] text-center">상부구조</th>
                                        <th id="th-lower-criteria" class="p-3 border-r border-gray-200 font-bold text-gray-500 text-[10px] text-center">하부구조</th>
                                        <th id="th-upper-qty" class="p-3 border-r border-gray-200 font-black text-blue-600 text-[10px] text-center">상부 (기준/금회)</th>
                                        <th id="th-lower-qty" class="p-3 border-r border-gray-200 font-black text-blue-600 text-[10px] text-center">하부 (기준/금회)</th>
                                    </tr>
                                </thead>
                                <tbody id="results-body" class="divide-y divide-gray-100">
                                    <!-- JS Injected -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Footnotes -->
                    <div id="footnotes" class="space-y-4 px-2">
                        <!-- JS Injected -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 1. Data & Constants ---
        const STRUCTURE_INFO = {
            BRIDGE: { name: '교량', icon: '🌉' },
            TUNNEL: { name: '터널', icon: '🚇' },
            RETAINING_WALL: { name: '옹벽', icon: '🧱' },
        };

        const BRIDGE_TYPES = [
            'STB (강박스)', 'SPG (강플레이트)', 'PSCI (PSC I형)', 'SLAB (RC슬래브)', 'RA (라멘)',
            '트러스교', '아치교', '현수교', '사장교', '기타'
        ];

        const INSPECTION_INFO = {
            DETAILED_INSPECTION: { name: '정밀안전점검' },
            DETAILED_DIAGNOSIS: { name: '정밀안전진단' },
            PERFORMANCE_EVAL_1: { name: '1종 성능평가' },
            PERFORMANCE_EVAL_2: { name: '2종 성능평가' },
        };

        // --- 2. State Management ---
        let state = {
            selectedType: 'BRIDGE',
            inspectionType: 'DETAILED_DIAGNOSIS',
            facilityClass: 'CLASS_1',
            bridgeSpans: [
                { id: '1', type: 'STB (강박스)', spanLength: 30, spanCount: 3, girderCount: 5 }
            ],
            tunnelSections: [
                { id: '1', type: '표준단면', length: 100, concreteType: 'REINFORCED' }
            ],
            retainingWallTotalArea: 1000,
            wallConcreteType: 'CONCRETE',
            evalUnit: 20,
            implQtys: {} // { ruleId: { upper: { type: val }, lower: { type: val } } }
        };

        // --- 3. Calculation Logic (Ported from constants.ts) ---
        const calcByLength = (l, d) => Math.max(1, Math.ceil(l / d));

        const getAdjustmentRatio = (l) => {
            if (l <= 300) return 1.0;
            if (l <= 500) return Number((1.0 - (0.2 * (l - 300) / 200)).toFixed(3));
            if (l <= 1000) return Number((0.8 - (0.2 * (l - 500) / 500)).toFixed(3));
            if (l <= 2000) return Number((0.6 - (0.2 * (l - 1000) / 1000)).toFixed(3));
            if (l <= 4000) return Number((0.4 - (0.15 * (l - 2000) / 2000)).toFixed(3));
            return 0.25;
        };

        const isSteelStructure = (t) => 
            t.includes('강') || t.includes('STB') || t.includes('SPG') || t.includes('트러스') || t.includes('현수') || t.includes('사장');

        const TEST_RULES = {
            BRIDGE: [
                {
                    id: 'rebound', name: '반발경도시험', unit: '개소', category: 'BASIC',
                    calculate: (p) => {
                        const isD = p.inspectionType === 'DETAILED_DIAGNOSIS' || p.inspectionType === 'PERFORMANCE_EVAL_1';
                        const r = getAdjustmentRatio(p.totalLength);
                        const uB = {}, lB = {};
                        const rcSpans = p.bridgeSpans.filter(s => !isSteelStructure(s.type));
                        const stSpans = p.bridgeSpans.filter(s => isSteelStructure(s.type));
                        const rcL = rcSpans.reduce((a, s) => a + s.spanLength * s.spanCount, 0);
                        const stL = stSpans.reduce((a, s) => a + s.spanLength * s.spanCount, 0);

                        if (rcL > 0) {
                            const total = Math.ceil(calcByLength(rcL, 50) * (isD ? 2 : 1) * r);
                            rcSpans.forEach((s, i) => {
                                const k = `${s.type} (${s.spanLength}m×${s.spanCount}경간)`;
                                if (i === rcSpans.length - 1) uB[k] = total - Object.values(uB).reduce((a, b) => a + b, 0);
                                else uB[k] = Math.round(total * (s.spanLength * s.spanCount / rcL));
                            });
                        }
                        if (stL > 0) {
                            const total = Math.ceil(calcByLength(stL, 50) * 1 * r);
                            stSpans.forEach((s, i) => {
                                const k = `${s.type} (${s.spanLength}m×${s.spanCount}경간)`;
                                if (i === stSpans.length - 1) uB[k] = total - Object.values(uB).filter((v, idx) => isSteelStructure(stSpans[idx].type)).reduce((a, b) => a + b, 0);
                                else uB[k] = Math.round(total * (s.spanLength * s.spanCount / stL));
                            });
                            // Simple fix for steel sum
                            const currentStSum = stSpans.reduce((acc, s) => acc + (uB[`${s.type} (${s.spanLength}m×${s.spanCount}경간)`] || 0), 0);
                            if (stSpans.length > 0) uB[`${stSpans[stSpans.length-1].type} (${stSpans[stSpans.length-1].spanLength}m×${stSpans[stSpans.length-1].spanCount}경간)`] += (total - currentStSum);
                        }
                        const totalL = Math.ceil(calcByLength(p.totalLength, 50) * r);
                        p.bridgeSpans.forEach((s, i) => {
                            const k = `${s.type} (${s.spanLength}m×${s.spanCount}경간)`;
                            if (i === p.bridgeSpans.length - 1) lB[k] = totalL - Object.values(lB).reduce((a, b) => a + b, 0);
                            else lB[k] = Math.round(totalL * (s.spanLength * s.spanCount / p.totalLength));
                        });
                        return { upperQty: uB, lowerQty: lB, upperCriteria: isD ? 'RC: 2개소/50m, 강재: 1개소/50m' : '1개소/50m', lowerCriteria: '1개소/연장 50m', remarks: '동일부위 시험', adjustmentRatio: r };
                    }
                },
                {
                    id: 'ultrasonic', name: '초음파 전달속도시험', unit: '개소', category: 'BASIC',
                    calculate: (p) => {
                        if (p.inspectionType === 'DETAILED_INSPECTION' && (p.facilityClass === 'CLASS_1' || p.facilityClass === 'CLASS_2')) return { upperQty: '-', lowerQty: '-', upperCriteria: '시행 제외', lowerCriteria: '시행 제외', remarks: '1,2종 정밀안전점검 제외' };
                        const isD = p.inspectionType === 'DETAILED_DIAGNOSIS' || p.inspectionType === 'PERFORMANCE_EVAL_1';
                        const r = getAdjustmentRatio(p.totalLength);
                        const uB = {}, lB = {};
                        const rcSpans = p.bridgeSpans.filter(s => !isSteelStructure(s.type));
                        const stSpans = p.bridgeSpans.filter(s => isSteelStructure(s.type));
                        const rcL = rcSpans.reduce((a, s) => a + s.spanLength * s.spanCount, 0);
                        const stL = stSpans.reduce((a, s) => a + s.spanLength * s.spanCount, 0);
                        if (rcL > 0) {
                            const total = Math.ceil(calcByLength(rcL, 50) * (isD ? 2 : 1) * r);
                            rcSpans.forEach((s, i) => {
                                const k = `${s.type} (${s.spanLength}m×${s.spanCount}경간)`;
                                if (i === rcSpans.length - 1) uB[k] = total - Object.values(uB).reduce((a, b) => a + b, 0);
                                else uB[k] = Math.round(total * (s.spanLength * s.spanCount / rcL));
                            });
                        }
                        if (stL > 0) {
                            const total = Math.ceil(calcByLength(stL, 50) * 1 * r);
                            stSpans.forEach((s, i) => {
                                const k = `${s.type} (${s.spanLength}m×${s.spanCount}경간)`;
                                if (i === stSpans.length - 1) uB[k] = total - Object.values(uB).filter((v, idx) => isSteelStructure(stSpans[idx].type)).reduce((a, b) => a + b, 0);
                                else uB[k] = Math.round(total * (s.spanLength * s.spanCount / stL));
                            });
                            const currentStSum = stSpans.reduce((acc, s) => acc + (uB[`${s.type} (${s.spanLength}m×${s.spanCount}경간)`] || 0), 0);
                            if (stSpans.length > 0) uB[`${stSpans[stSpans.length-1].type} (${stSpans[stSpans.length-1].spanLength}m×${stSpans[stSpans.length-1].spanCount}경간)`] += (total - currentStSum);
                        }
                        const totalL = Math.ceil(calcByLength(p.totalLength, 50) * r);
                        p.bridgeSpans.forEach((s, i) => {
                            const k = `${s.type} (${s.spanLength}m×${s.spanCount}경간)`;
                            if (i === p.bridgeSpans.length - 1) lB[k] = totalL - Object.values(lB).reduce((a, b) => a + b, 0);
                            else lB[k] = Math.round(totalL * (s.spanLength * s.spanCount / p.totalLength));
                        });
                        return { upperQty: uB, lowerQty: lB, upperCriteria: isD ? 'RC: 2개소/50m, 강재: 1개소/50m' : '1개소/50m', lowerCriteria: '1개소/연장 50m', remarks: '동일부위 시험', adjustmentRatio: r };
                    }
                },
                {
                    id: 'rebar_scan', name: '철근탐사시험', unit: '개소', category: 'BASIC',
                    calculate: (p) => {
                        if (p.inspectionType === 'DETAILED_INSPECTION') return { upperQty: '판단', lowerQty: '판단', upperCriteria: '과업 내용에 의해 조사 및 수량 결정', lowerCriteria: '과업 내용에 의해 조사 및 수량 결정', remarks: '선택과업' };
                        const isD = p.inspectionType === 'DETAILED_DIAGNOSIS' || p.inspectionType === 'PERFORMANCE_EVAL_1';
                        const r = getAdjustmentRatio(p.totalLength);
                        const uB = {}, lB = {};
                        const rcSpans = p.bridgeSpans.filter(s => !isSteelStructure(s.type));
                        const stSpans = p.bridgeSpans.filter(s => isSteelStructure(s.type));
                        const rcL = rcSpans.reduce((a, s) => a + s.spanLength * s.spanCount, 0);
                        const stL = stSpans.reduce((a, s) => a + s.spanLength * s.spanCount, 0);
                        if (rcL > 0) {
                            const total = Math.ceil(calcByLength(rcL, 50) * (isD ? 2 : 1) * r);
                            rcSpans.forEach((s, i) => {
                                const k = `${s.type} (${s.spanLength}m×${s.spanCount}경간)`;
                                if (i === rcSpans.length - 1) uB[k] = total - Object.values(uB).reduce((a, b) => a + b, 0);
                                else uB[k] = Math.round(total * (s.spanLength * s.spanCount / rcL));
                            });
                        }
                        if (stL > 0) {
                            const total = Math.ceil(calcByLength(stL, 50) * 1 * r);
                            stSpans.forEach((s, i) => {
                                const k = `${s.type} (${s.spanLength}m×${s.spanCount}경간)`;
                                if (i === stSpans.length - 1) uB[k] = total - Object.values(uB).filter((v, idx) => isSteelStructure(stSpans[idx].type)).reduce((a, b) => a + b, 0);
                                else uB[k] = Math.round(total * (s.spanLength * s.spanCount / stL));
                            });
                            const currentStSum = stSpans.reduce((acc, s) => acc + (uB[`${s.type} (${s.spanLength}m×${s.spanCount}경간)`] || 0), 0);
                            if (stSpans.length > 0) uB[`${stSpans[stSpans.length-1].type} (${stSpans[stSpans.length-1].spanLength}m×${stSpans[stSpans.length-1].spanCount}경간)`] += (total - currentStSum);
                        }
                        const totalL = Math.ceil(calcByLength(p.totalLength, 50) * r);
                        p.bridgeSpans.forEach((s, i) => {
                            const k = `${s.type} (${s.spanLength}m×${s.spanCount}경간)`;
                            if (i === p.bridgeSpans.length - 1) lB[k] = totalL - Object.values(lB).reduce((a, b) => a + b, 0);
                            else lB[k] = Math.round(totalL * (s.spanLength * s.spanCount / p.totalLength));
                        });
                        return { upperQty: uB, lowerQty: lB, upperCriteria: isD ? 'RC: 2개소/50m, 강재: 1개소/50m' : '1개소/50m', lowerCriteria: '1개소/연장 50m', remarks: '탄산화 측정 위치 수행', adjustmentRatio: r };
                    }
                },
                {
                    id: 'carbonation', name: '탄산화깊이 측정', unit: '개소', category: 'BASIC',
                    calculate: (p) => {
                        const isD = p.inspectionType === 'DETAILED_DIAGNOSIS' || p.inspectionType === 'PERFORMANCE_EVAL_1';
                        const uB = {}, lB = {};
                        const totalSpanCount = p.bridgeSpans.reduce((acc, s) => acc + s.spanCount, 0);
                        const isSmall = totalSpanCount <= 5;
                        const baseUpper = isD ? (isSmall ? 2 : 3) : (isSmall ? 1 : 2);
                        const baseLower = isD ? (isSmall ? 4 : 6) : (isSmall ? 2 : 4);
                        p.bridgeSpans.forEach((s, idx) => {
                            const key = `${s.type} (${s.spanLength}m×${s.spanCount}경간)`;
                            const proportion = s.spanCount / totalSpanCount;
                            if (idx === p.bridgeSpans.length - 1) {
                                const uSum = Object.values(uB).reduce((a, b) => a + b, 0);
                                const lSum = Object.values(lB).reduce((a, b) => a + b, 0);
                                uB[key] = Math.max(0, baseUpper - uSum);
                                lB[key] = Math.max(0, baseLower - lSum);
                            } else {
                                uB[key] = Math.round(baseUpper * proportion);
                                lB[key] = Math.round(baseLower * proportion);
                            }
                        });
                        return { upperQty: uB, lowerQty: lB, upperCriteria: isD ? '5경간 이내: 2개소, 5경간 이상: 3개소' : '5경간 이내: 1개소, 5경간 이상: 2개소', lowerCriteria: isD ? '5경간 이내: 4개소, 5경간 이상: 6개소' : '5경간 이내: 2개소, 5경간 이상: 4개소', remarks: '상·하부 통합 산정\n(교량 전체 기준)' };
                    }
                },
                {
                    id: 'chloride', name: '염화물 함유량시험', unit: '개소', category: 'BASIC',
                    calculate: (p) => {
                        if (p.inspectionType === 'DETAILED_INSPECTION') return { upperQty: '판단', lowerQty: '판단', upperCriteria: '과업 내용에 의해 조사 및 수량 결정', lowerCriteria: '과업 내용에 의해 조사 및 수량 결정', remarks: '선택과업' };
                        const isD = p.inspectionType === 'DETAILED_DIAGNOSIS' || p.inspectionType === 'PERFORMANCE_EVAL_1';
                        if (!isD) return { upperQty: '판단', lowerQty: '판단', upperCriteria: '책임기술자 판단', lowerCriteria: '책임기술자 판단' };
                        const uB = {}, lB = {};
                        p.bridgeSpans.forEach((s, idx) => {
                            const key = `${s.type} (${s.spanLength}m×${s.spanCount}경간)`;
                            if (idx === 0) { uB[key] = 1; lB[key] = 2; }
                            else { uB[key] = 0; lB[key] = 0; }
                        });
                        return { upperQty: uB, lowerQty: lB, upperCriteria: '상부구조 1개소 이상', lowerCriteria: '하부구조 2개소 이상', remarks: '주3) 참조\n(교량 전체 기준)' };
                    }
                },
                {
                    id: 'crack_depth', name: '균열깊이 조사', unit: '-', category: 'BASIC',
                    calculate: () => ({ upperQty: '-', lowerQty: '-', upperCriteria: '부재의 중요도를 고려하여 결정', lowerCriteria: '책임기술자의 판단에 따라 수량 결정', remarks: 'Cw=0.3mm 이상 균열' })
                },
                {
                    id: 'steel_ut', name: '강재용접부 초음파탐상', unit: '개소', category: 'BASIC',
                    calculate: (p) => {
                        const isD = p.inspectionType === 'DETAILED_DIAGNOSIS' || p.inspectionType === 'PERFORMANCE_EVAL_1';
                        if (!isD) return { upperQty: '-', lowerQty: '-', upperCriteria: '-', lowerCriteria: '-' };
                        const uB = {};
                        p.bridgeSpans.forEach((s) => {
                            let qty = 0;
                            if (s.type.includes('STB') || s.type.includes('박스')) qty = s.spanCount * s.girderCount * 2;
                            else if (s.type.includes('SPG') || s.type.includes('플레이트')) qty = s.spanCount * s.girderCount * 1;
                            if (qty > 0) {
                                const key = `${s.type} (${s.spanLength}m×${s.spanCount}경간)`;
                                uB[key] = (uB[key] || 0) + qty;
                            }
                        });
                        return { upperQty: Object.keys(uB).length > 0 ? uB : '-', lowerQty: '-', upperCriteria: '플레이트거더: 1개소/경간별 거더\n박스거더: 2개소/경간별 거더', remarks: '맞대기용접부' };
                    }
                },
                {
                    id: 'core_sampling', name: '코어채취', unit: '개소', category: 'OPTIONAL',
                    calculate: () => ({ upperQty: '판단', lowerQty: '판단', upperCriteria: '과업 내용에 의해 조사 및 수량 결정', lowerCriteria: '과업 내용에 의해 조사 및 수량 결정' })
                }
            ],
            TUNNEL: [
                {
                    id: 'survey_section', name: '측정분할', unit: '간격', category: 'BASIC',
                    calculate: (p) => ({ upperQty: (p.inspectionType.includes('DIAGNOSIS') || p.inspectionType.includes('EVAL')) ? '5~50m' : '100m', lowerQty: '-', upperCriteria: '5~50m 간격', remarks: '책임기술자 조정 가능' })
                },
                {
                    id: 'cross_section', name: '단면측량', unit: '개소', category: 'BASIC',
                    calculate: (p) => {
                        if (!p.inspectionType.includes('DIAGNOSIS') && !p.inspectionType.includes('EVAL_1')) return { upperQty: '-', lowerQty: '-', upperCriteria: '-', lowerCriteria: '-' };
                        const qty = Math.ceil(p.totalLength / 200) + 1;
                        return { upperQty: qty, lowerQty: '-', upperCriteria: '(총연장÷200m)+1개소', remarks: '책임기술자 조정 가능' };
                    }
                },
                {
                    id: 'rebound', name: '반발경도시험', unit: '개소', category: 'BASIC',
                    calculate: (p) => {
                        const isD = p.inspectionType.includes('DIAGNOSIS') || p.inspectionType.includes('EVAL_1');
                        const divisor = isD ? 100 : 300;
                        const qty = Math.ceil(p.totalLength / divisor) * (isD ? 2 : 1);
                        return { upperQty: qty, lowerQty: '-', upperCriteria: isD ? '(총연장÷100m)×2개소' : '(총연장÷300m)개소' };
                    }
                }
            ],
            RETAINING_WALL: [
                {
                    id: 'rebound', name: '반발경도시험', unit: '개소', category: 'BASIC',
                    calculate: (p) => {
                        const isD = p.inspectionType.includes('DIAGNOSIS') || p.inspectionType.includes('EVAL_1');
                        const qty = Math.ceil(p.totalArea / 500) * (isD ? 2 : 1);
                        return { upperQty: qty, lowerQty: '-', upperCriteria: isD ? '2개소/500㎡' : '1개소/500㎡' };
                    }
                }
            ]
        };

        // --- 4. UI Rendering & Logic ---
        function updateState(updates) {
            state = { ...state, ...updates };
            render();
        }

        function renderTypeSelector() {
            const container = document.getElementById('type-selector');
            container.innerHTML = '';
            Object.entries(STRUCTURE_INFO).forEach(([key, info]) => {
                const btn = document.createElement('button');
                btn.className = `flex flex-col items-center justify-center p-3 rounded-2xl border-2 transition-all active:scale-95 ${state.selectedType === key ? 'border-blue-600 bg-blue-50 text-blue-600 shadow-lg shadow-blue-100' : 'border-gray-100 bg-white text-gray-400 hover:border-gray-200'}`;
                btn.innerHTML = `<span class="text-2xl mb-1">${info.icon}</span><span class="text-[10px] font-black">${info.name}</span>`;
                btn.onclick = () => updateState({ selectedType: key });
                container.appendChild(btn);
            });
        }

        function renderDynamicInputs() {
            const container = document.getElementById('dynamic-inputs');
            container.innerHTML = '';

            if (state.selectedType === 'BRIDGE') {
                const header = document.createElement('div');
                header.className = 'flex items-center justify-between mb-4';
                header.innerHTML = `<label class="text-[10px] font-black text-gray-500 uppercase tracking-widest">경간 구성 정보</label>
                    <button onclick="addBridgeSpan()" class="px-3 py-1 bg-blue-600 text-white rounded-lg text-[10px] font-black shadow-md hover:bg-blue-700 transition-all">➕ 추가</button>`;
                container.appendChild(header);

                state.bridgeSpans.forEach((span, idx) => {
                    const card = document.createElement('div');
                    card.className = 'p-4 bg-gray-50 border border-gray-200 rounded-2xl space-y-4 relative group hover:border-blue-200 transition-all';
                    card.innerHTML = `
                        <button onclick="removeBridgeSpan('${span.id}')" class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-all shadow-lg">🗑️</button>
                        <div>
                            <label class="block text-[8px] font-black text-gray-400 uppercase mb-1 ml-0.5">형식</label>
                            <select onchange="updateBridgeSpan('${span.id}', 'type', this.value)" class="w-full bg-white border border-gray-200 rounded-lg px-2 py-1.5 text-[11px] font-bold outline-none focus:ring-2 focus:ring-blue-500">
                                ${BRIDGE_TYPES.map(t => `<option value="${t}" ${span.type === t ? 'selected' : ''}>${t}</option>`).join('')}
                            </select>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <div>
                                <label class="block text-[8px] font-black text-gray-400 uppercase mb-1 ml-0.5">연장(m)</label>
                                <input type="number" value="${span.spanLength}" onchange="updateBridgeSpan('${span.id}', 'spanLength', this.value)" class="w-full bg-white border border-gray-200 rounded-lg px-2 py-1.5 text-[11px] font-bold outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-[8px] font-black text-gray-400 uppercase mb-1 ml-0.5">경간수</label>
                                <input type="number" value="${span.spanCount}" onchange="updateBridgeSpan('${span.id}', 'spanCount', this.value)" class="w-full bg-white border border-gray-200 rounded-lg px-2 py-1.5 text-[11px] font-bold outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-[8px] font-black text-gray-400 uppercase mb-1 ml-0.5">거더수</label>
                                <input type="number" value="${span.girderCount}" onchange="updateBridgeSpan('${span.id}', 'girderCount', this.value)" class="w-full bg-white border border-gray-200 rounded-lg px-2 py-1.5 text-[11px] font-bold outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } else if (state.selectedType === 'TUNNEL') {
                container.innerHTML = `<div>
                    <label class="block text-[9px] font-black text-[#6B7280] uppercase mb-1 ml-0.5 tracking-wider">터널 총 연장 (m)</label>
                    <input type="number" value="${state.tunnelTotalLength}" onchange="updateState({ tunnelTotalLength: Number(this.value) })" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2.5 text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm">
                </div>`;
            } else if (state.selectedType === 'RETAINING_WALL') {
                container.innerHTML = `<div>
                    <label class="block text-[9px] font-black text-[#6B7280] uppercase mb-1 ml-0.5 tracking-wider">옹벽 총 면적 (㎡)</label>
                    <input type="number" value="${state.retainingWallTotalArea}" onchange="updateState({ retainingWallTotalArea: Number(this.value) })" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2.5 text-sm font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm">
                </div>`;
            }
        }

        function addBridgeSpan() {
            const newSpans = [...state.bridgeSpans, { id: Date.now().toString(), type: 'STB (강박스)', spanLength: 30, spanCount: 1, girderCount: 5 }];
            updateState({ bridgeSpans: newSpans });
        }

        function removeBridgeSpan(id) {
            const newSpans = state.bridgeSpans.filter(s => s.id !== id);
            updateState({ bridgeSpans: newSpans });
        }

        function updateBridgeSpan(id, field, value) {
            const newSpans = state.bridgeSpans.map(s => s.id === id ? { ...s, [field]: field === 'type' ? value : Number(value) } : s);
            updateState({ bridgeSpans: newSpans });
        }

        function renderQty(qty, ruleId, part, category) {
            const isJudgment = qty === '판단';
            const isNone = qty === '-';
            if (isNone) return '<span class="text-gray-300 font-bold">-</span>';

            let baseDisplay = '';
            let totalBase = 0;

            if (typeof qty === 'object') {
                totalBase = Object.values(qty).reduce((a, b) => a + (typeof b === 'number' ? b : 0), 0);
                baseDisplay = Object.entries(qty).map(([type, val]) => `
                    <div class="flex items-center justify-between gap-2 py-1 border-b border-gray-50 last:border-0">
                        <span class="text-[7px] text-gray-400 font-bold truncate max-w-[100px]">${type}</span>
                        <span class="text-[9px] text-blue-600 font-black">${val}</span>
                    </div>
                `).join('') + `
                    <div class="mt-1 pt-1 border-t border-blue-100 flex justify-between items-center">
                        <span class="text-[8px] text-blue-400 font-black uppercase">Total</span>
                        <span class="text-[10px] text-blue-800 font-black">${totalBase}</span>
                    </div>
                `;
            } else {
                totalBase = typeof qty === 'number' ? qty : 0;
                baseDisplay = `<span class="text-blue-700 font-black text-[11px]">${qty}</span>`;
            }

            const currentVal = state.implQtys[ruleId]?.[part] ?? (category === 'OPTIONAL' ? '-' : (typeof qty === 'object' ? totalBase : qty));

            return `
                <div class="flex flex-col gap-1.5 ${isJudgment ? 'items-center' : 'items-start'}">
                    <div class="w-full">${baseDisplay}</div>
                    <div class="flex items-center gap-1 w-full bg-purple-50 p-1 rounded-lg border border-purple-100">
                        <span class="text-[8px] text-purple-400 font-black">실시:</span>
                        <input type="text" value="${currentVal}" 
                            onchange="updateImplQty('${ruleId}', '${part}', this.value)"
                            class="w-full bg-transparent text-purple-700 text-[10px] font-black outline-none text-center"
                        >
                    </div>
                </div>
            `;
        }

        function updateImplQty(ruleId, part, value) {
            if (!state.implQtys[ruleId]) state.implQtys[ruleId] = {};
            state.implQtys[ruleId][part] = value;
        }

        function renderTable() {
            const body = document.getElementById('results-body');
            body.innerHTML = '';

            const totalLength = state.selectedType === 'BRIDGE' 
                ? state.bridgeSpans.reduce((acc, s) => acc + s.spanLength * s.spanCount, 0)
                : (state.selectedType === 'TUNNEL' ? state.tunnelTotalLength : 0);
            
            const totalArea = state.selectedType === 'RETAINING_WALL' ? state.retainingWallTotalArea : 0;

            const rules = TEST_RULES[state.selectedType];
            
            // Group by category
            const basicRules = rules.filter(r => r.category === 'BASIC');
            const optionalRules = rules.filter(r => r.category === 'OPTIONAL');

            const renderRows = (list, title, color) => {
                if (list.length === 0) return;
                const header = document.createElement('tr');
                header.className = `bg-${color}-50/30`;
                header.innerHTML = `<td colspan="6" class="px-4 py-1.5 text-[9px] font-black text-${color}-600 uppercase tracking-widest">${title}</td>`;
                body.appendChild(header);

                list.forEach(rule => {
                    const res = rule.calculate({
                        totalLength, totalArea,
                        inspectionType: state.inspectionType,
                        facilityClass: state.facilityClass,
                        bridgeSpans: state.bridgeSpans,
                        tunnelSections: state.tunnelSections,
                        wallConcreteType: state.wallConcreteType
                    });

                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-gray-50 transition-colors';
                    
                    let cells = `
                        <td class="p-3 border-r border-gray-200 font-bold text-gray-900 text-center whitespace-pre-line break-all text-[9px]">
                            ${rule.name}
                            ${res.adjustmentRatio && res.adjustmentRatio < 1 ? `<div class="text-[7px] text-red-500 font-black mt-1">조정비 ${(res.adjustmentRatio * 100).toFixed(1)}% 적용</div>` : ''}
                        </td>
                    `;

                    if (state.selectedType === 'TUNNEL' || state.selectedType === 'RETAINING_WALL') {
                        cells += `
                            <td colspan="4" class="p-3 border-r border-gray-200 text-[9px]">
                                <div class="flex flex-col gap-1 items-start">
                                    <div class="text-gray-400 font-medium">기준: ${res.upperCriteria || '-'}</div>
                                    <div class="w-full">${renderQty(res.upperQty, rule.id, 'upper', rule.category)}</div>
                                </div>
                            </td>
                        `;
                    } else {
                        cells += `
                            <td class="p-3 border-r border-gray-200 text-gray-600 leading-tight whitespace-pre-line text-[9px]">${res.upperCriteria || '-'}</td>
                            <td class="p-3 border-r border-gray-200 text-gray-600 leading-tight whitespace-pre-line text-[9px]">${res.lowerCriteria || '-'}</td>
                            <td class="p-3 border-r border-gray-200 font-medium text-gray-700">${renderQty(res.upperQty, rule.id, 'upper', rule.category)}</td>
                            <td class="p-3 border-r border-gray-200 font-medium text-gray-700">${renderQty(res.lowerQty, rule.id, 'lower', rule.category)}</td>
                        `;
                    }

                    cells += `<td class="p-3 text-gray-500 text-[9px] leading-tight">${res.remarks || '-'}</td>`;
                    tr.innerHTML = cells;
                    body.appendChild(tr);
                });
            };

            renderRows(basicRules, '기본과업 (Basic Tasks)', 'blue');
            renderRows(optionalRules, '선택과업 (Optional Tasks)', 'purple');
        }

        function renderFootnotes() {
            const container = document.getElementById('footnotes');
            const totalLength = state.selectedType === 'BRIDGE' 
                ? state.bridgeSpans.reduce((acc, s) => acc + s.spanLength * s.spanCount, 0)
                : state.tunnelTotalLength;
            
            container.innerHTML = `
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-200 shadow-sm">
                    <p class="text-[10px] font-black text-gray-700 mb-2 uppercase tracking-widest">
                        ※ ${state.selectedType === 'TUNNEL' ? '터널 재료시험 산출 기준' : '연장별 조정비 산정 기준 (300m 이상)'}
                    </p>
                    ${state.selectedType === 'TUNNEL' ? `
                        <div class="text-[9px] text-gray-500 font-bold space-y-1.5">
                            <p>• 반발경도시험, 초음파법 결과를 비교할 경우에는 시험부위가 동일하여야 함</p>
                            <p>• 터널은 상·하부 구조 구분이 없으므로 통합 수량으로 산출함</p>
                        </div>
                    ` : `
                        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 text-[9px] text-gray-500 font-bold border-b border-gray-200 pb-3 mb-3">
                            <p>• 300m 이하: 100%</p><p>• 500m 이하: 80%</p><p>• 1,000m 이하: 60%</p><p>• 2,000m 이하: 40%</p><p>• 4,000m 이하: 25%</p>
                        </div>
                    `}
                    <div class="bg-white p-3 rounded-xl border border-blue-100 mt-3 flex items-center justify-between">
                        <div>
                            <p class="text-[10px] font-black text-blue-800 mb-1">현재 시설물 산정 정보</p>
                            <p class="text-[11px] font-black text-blue-600">
                                ${state.selectedType === 'BRIDGE' ? `총 연장(L) = ${totalLength}m (조정비: ${getAdjustmentRatio(totalLength)})` : `총 연장/면적: ${totalLength || state.retainingWallTotalArea}m/㎡`}
                            </p>
                        </div>
                        <div class="text-[9px] text-blue-400 font-bold italic">
                            Latest Guidelines Applied
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            renderTypeSelector();
            renderDynamicInputs();
            
            const info = STRUCTURE_INFO[state.selectedType];
            document.getElementById('summary-icon').innerText = info.icon;
            document.getElementById('summary-title').innerText = `${info.name} 안전진단 산출표`;
            
            // Adjust table headers
            const isSingle = state.selectedType === 'TUNNEL' || state.selectedType === 'RETAINING_WALL';
            document.getElementById('th-upper-criteria').style.display = isSingle ? 'none' : '';
            document.getElementById('th-lower-criteria').style.display = isSingle ? 'none' : '';
            document.getElementById('th-upper-qty').colSpan = isSingle ? 2 : 1;
            document.getElementById('th-lower-qty').style.display = isSingle ? 'none' : '';
            if (isSingle) {
                document.getElementById('th-upper-qty').innerText = '산정기준 및 수량산출 (기준/금회)';
            } else {
                document.getElementById('th-upper-qty').innerText = '상부 (기준/금회)';
                document.getElementById('th-lower-qty').innerText = '하부 (기준/금회)';
            }

            renderTable();
            renderFootnotes();
        }

        function exportData() {
            const data = JSON.stringify(state, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `safety_inspection_data_${Date.now()}.json`;
            a.click();
        }

        // --- 5. Event Listeners ---
        document.getElementById('inspection-type').onchange = (e) => updateState({ inspectionType: e.target.value });
        document.getElementById('facility-class').onchange = (e) => updateState({ facilityClass: e.target.value });

        // Initial Render
        render();
    </script>
</body>
</html>
